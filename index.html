<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Betrieb Störungen</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #ffffff;
  --bg2: #f7f7f6;
  --bg3: #efefed;
  --text: #111110;
  --text2: #605f5b;
  --text3: #a09f9a;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --orange: #e8581a;
  --orange-bg: #fff0e8;
  --red: #c0392b;
  --red-bg: #fee2e2;
  --red-txt: #7f1d1d;
  --green: #1c9e6e;
  --green-bg: #d9f5eb;
  --green-txt: #0d5c3e;
  --amber: #b45309;
  --amber-bg: #fef3c7;
  --purple: #6d28d9;
  --purple-bg: #ede9fe;
  --purple-txt: #4c1d95;
  --sidebar-w: 200px;
  --radius: 8px;
  --sidebar-bg: #232C2B;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg3); color: var(--text); font-size: 14px; -webkit-font-smoothing: antialiased; }

/* APP SHELL */
.app { display: flex; height: 100vh; overflow: hidden; }

/* SIDEBAR */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}
.sidebar-logo {
  padding: 14px 16px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
}
.amba-logo-text { display: flex; flex-direction: column; align-items: center; gap: 0; line-height: 1; width: 100%; }
.amba-logo-amba { font-size: 22px; font-weight: 300; letter-spacing: 0.25em; color: #fff; font-family: 'DM Sans', sans-serif; text-align: center; }
.amba-logo-ops { font-size: 11px; font-weight: 300; letter-spacing: 0.08em; color: rgba(255,255,255,0.65); border-top: 1px solid rgba(200,180,210,0.4); padding-top: 3px; margin-top: 4px; text-align: center; width: 100%; }

.sidebar-nav { flex: 1; padding: 8px 0; overflow-y: auto; }
.nav-section { padding: 14px 16px 4px; font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.08em; }
.nav-item {
  width: 100%; display: flex; align-items: center; gap: 10px;
  padding: 9px 16px; font-size: 13px; font-family: 'DM Sans', sans-serif;
  color: rgba(255,255,255,0.65); background: none; border: none;
  border-left: 2px solid transparent; cursor: pointer; text-align: left; transition: all 0.1s;
}
.nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
.nav-item.active { color: #fff; background: rgba(255,255,255,0.12); border-left-color: var(--orange); font-weight: 500; }
.nav-icon { font-size: 14px; width: 16px; text-align: center; flex-shrink: 0; }
.nav-count { font-size: 10px; background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); padding: 1px 6px; border-radius: 10px; }

/* MAIN */
.main-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-width: 0; }

/* TOPBAR */
.topbar {
  padding: 10px 20px; background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.topbar-title { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
.search-wrap { position: relative; }
.search-wrap input {
  padding: 6px 12px 6px 32px; border: 1px solid var(--border2);
  border-radius: var(--radius); font-size: 13px; font-family: 'DM Sans', sans-serif;
  background: var(--bg2); color: var(--text); outline: none; width: 220px;
}
.search-wrap input:focus { border-color: var(--orange); background: var(--bg); }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 12px; pointer-events: none; }
.topbar-actions { margin-left: auto; display: flex; gap: 8px; }

/* CONTENT AREA WITH PANEL */
.content-area { flex: 1; display: flex; overflow: hidden; }

/* LIST PANEL */
.list-panel { flex: 1; overflow-y: auto; padding: 16px; min-width: 0; }

/* DETAIL PANEL */
.detail-panel {
  width: 380px; min-width: 380px; background: var(--bg);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden; flex-shrink: 0;
  transform: translateX(100%);
  transition: transform 0.2s ease;
  position: relative;
}
.detail-panel.open { transform: translateX(0); }
.detail-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; justify-content: space-between; flex-shrink: 0;
}
.detail-header-info { flex: 1; min-width: 0; }
.detail-title { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
.detail-sub { font-size: 12px; color: var(--text3); margin-top: 2px; font-family: 'DM Mono', monospace; }
.detail-close { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 18px; padding: 2px 6px; border-radius: 4px; flex-shrink: 0; }
.detail-close:hover { background: var(--bg3); color: var(--text); }
.detail-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
.detail-section { margin-bottom: 20px; }
.detail-section-title { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
.detail-field { margin-bottom: 10px; }
.detail-label { font-size: 11px; color: var(--text3); margin-bottom: 3px; }
.detail-value { font-size: 13px; color: var(--text); }
.detail-value.mono { font-family: 'DM Mono', monospace; font-size: 12px; }
.detail-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; flex-shrink: 0; }

/* CARDS */
.card {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 14px;
  margin-bottom: 6px; cursor: pointer;
  transition: background 0.08s, box-shadow 0.08s;
  border-left: 4px solid transparent;
}
.card:hover { box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.card.selected { outline: 2px solid var(--orange); outline-offset: -1px; }
.card.rot { border-left-color: #ef4444; background: #fff5f5; }
.card.gelb { border-left-color: #f59e0b; background: #fffbf0; }
.card.gruen { border-left-color: #22c55e; background: #f0fdf4; }
.card.rot:hover { background: #ffe8e8; }
.card.gelb:hover { background: #fff3d0; }
.card.gruen:hover { background: #e0faf0; }

.card-row { display: flex; align-items: center; gap: 8px; }
.card-main { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
.card-name { font-weight: 500; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-meta { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 10px; margin-top: 3px; flex-wrap: wrap; }

/* BADGES */
.badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px; flex-shrink: 0; }
.badge-offline { background: #fff0e8; color: #c2410c; }
.badge-stoerung { background: #fef2f2; color: #b91c1c; }
.badge-ticket { background: var(--purple-bg); color: var(--purple-txt); }
.badge-irr { background: var(--bg3); color: var(--text3); }
.badge-erl { background: var(--green-bg); color: var(--green-txt); }

/* EVSE TAGS */
.evse-tags { display: flex; flex-wrap: wrap; gap: 3px; }
.evse-tag { background: var(--bg2); color: var(--text2); font-size: 10px; font-family: 'DM Mono', monospace; padding: 1px 6px; border-radius: 3px; border: 1px solid var(--border2); }

/* BUTTONS */
.btn { padding: 7px 14px; border-radius: var(--radius); border: none; cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif; display: inline-flex; align-items: center; gap: 6px; font-weight: 500; transition: all 0.1s; }
.btn-primary { background: var(--orange); color: #fff; }
.btn-primary:hover { background: #c94d17; }
.btn-secondary { background: var(--bg); color: var(--text2); border: 1px solid var(--border2); }
.btn-secondary:hover { background: var(--bg2); }
.btn-sm { font-size: 12px; padding: 5px 10px; }
.btn-danger { background: var(--bg); color: var(--red); border: 1px solid #fca5a5; }
.btn-danger:hover { background: var(--red-bg); }
.btn-success { background: var(--bg); color: var(--green); border: 1px solid #86efac; }
.btn-success:hover { background: var(--green-bg); }
.btn-green { background: var(--green); color: #fff; }
.btn-green:hover { background: var(--green-txt); }
.btn-red { background: var(--red); color: #fff; }
.btn-red:hover { background: var(--red-txt); }

/* EDIT FORM IN DETAIL PANEL */
.edit-form { display: flex; flex-direction: column; gap: 8px; }
.edit-form input, .edit-form textarea, .edit-form select {
  width: 100%; padding: 6px 10px; border: 1px solid var(--border2);
  border-radius: var(--radius); font-size: 13px; font-family: 'DM Sans', sans-serif;
  background: var(--bg2); color: var(--text); outline: none;
}
.edit-form input:focus, .edit-form textarea:focus, .edit-form select:focus { border-color: var(--orange); background: var(--bg); }
.edit-form textarea { resize: none; height: 60px; }
.edit-actions { display: flex; gap: 6px; flex-wrap: wrap; }

/* POPUP BOX */
.popup-box { display: none; background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius); padding: 12px; margin-top: 8px; }
.popup-box.open { display: block; }
.popup-box input, .popup-box select, .popup-box textarea { width: 100%; padding: 6px 10px; border: 1px solid var(--border2); border-radius: var(--radius); font-size: 13px; margin-bottom: 8px; font-family: 'DM Sans', sans-serif; }
.popup-box textarea { resize: none; height: 60px; }
.popup-actions { display: flex; gap: 6px; }

/* EMPTY STATE */
.empty { text-align: center; padding: 60px 0; color: var(--text3); }

/* INFO BOXES */
.info-box { border-radius: 6px; padding: 6px 10px; font-size: 12px; }
.info-box-green { background: var(--green-bg); color: var(--green-txt); border: 1px solid #86efac; }
.info-box-gray { background: var(--bg3); color: var(--text2); border: 1px solid var(--border2); }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
.modal-overlay.open { display: flex; }
.modal { background: var(--bg); border-radius: 12px; width: 100%; max-width: 680px; max-height: 90vh; display: flex; flex-direction: column; box-shadow: 0 8px 40px rgba(0,0,0,0.15); }
.modal-header { padding: 18px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.modal-header h2 { font-size: 16px; font-weight: 600; }
.modal-body { flex: 1; overflow-y: auto; padding: 20px 24px; }
.modal-footer { padding: 14px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
textarea.raw { width: 100%; height: 200px; font-family: 'DM Mono', monospace; font-size: 12px; border: 1px solid var(--border2); border-radius: var(--radius); padding: 10px; resize: none; background: var(--bg2); }

/* PREVIEW ITEMS */
.preview-item { border: 1px solid var(--border2); border-radius: var(--radius); padding: 10px; margin-bottom: 8px; font-size: 13px; background: var(--bg2); }
.preview-item-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
.preview-id { font-family: 'DM Mono', monospace; color: var(--text3); font-size: 11px; }

/* RESULT GRID */
.result-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.result-box { border-radius: var(--radius); padding: 14px; text-align: center; }
.result-box .num { font-size: 28px; font-weight: 600; }
.result-box .label { font-size: 12px; margin-top: 4px; color: var(--text2); }
.result-neu { background: var(--green-bg); color: var(--green); }
.result-lp { background: #eff6ff; color: #1e40af; }
.result-dup { background: var(--bg3); color: var(--text2); }
.error-box { background: var(--red-bg); color: var(--red-txt); padding: 10px 14px; border-radius: var(--radius); font-size: 13px; margin-top: 8px; }
.hint { font-size: 13px; color: var(--text2); margin-bottom: 12px; }

/* GRUPPEN */
.gruppe { margin-bottom: 8px; }
.gruppe-header { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius); cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text2); user-select: none; }
.gruppe-header:hover { background: var(--bg3); }
.gruppe-icon { font-size: 11px; transition: transform 0.15s; }
.gruppe-icon.open { transform: rotate(90deg); }
.gruppe-standort { flex: 1; }
.gruppe-count { font-size: 11px; color: var(--text3); }
.gruppe-cards { display: none; padding-left: 12px; border-left: 2px solid var(--border2); margin-top: 4px; }
.gruppe-cards.open { display: block; }
.gruppe-actions { display: flex; gap: 4px; }

/* MEHRFACHAUSWAHL */
.card-checkbox { position: absolute; top: 10px; left: 10px; width: 16px; height: 16px; opacity: 0; cursor: pointer; transition: opacity 0.15s; z-index: 2; }
.card:hover .card-checkbox, .card.checked .card-checkbox { opacity: 1; }
.card { position: relative; }
.card.checked { outline: 2px solid var(--orange); outline-offset: -1px; }
.aktionsleiste { display: none; position: sticky; bottom: 0; background: var(--sidebar-bg); color: #fff; padding: 10px 20px; align-items: center; gap: 10px; flex-shrink: 0; z-index: 20; border-top: 2px solid var(--orange); }
.aktionsleiste.visible { display: flex; }
.aktionsleiste-info { font-size: 13px; font-weight: 500; flex: 1; }
.mitarbeiter-badge { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 50%; background: var(--orange); color: #fff; font-size: 10px; font-weight: 700; flex-shrink: 0; cursor: pointer; title: "Mitarbeiter"; }
.mitarbeiter-badge.leer { background: var(--bg3); color: var(--text3); border: 1px dashed var(--border2); }

/* BANNER */
.banner-bar { padding: 0 20px; flex-shrink: 0; }
.banner-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: var(--radius); margin-bottom: 6px; font-size: 13px; }
.banner-item.gelb { background: var(--amber-bg); border: 1px solid #fcd34d; color: #92400e; }
.banner-item.rot { background: var(--red-bg); border: 1px solid #fca5a5; color: var(--red-txt); }
.banner-item.gruen { background: var(--green-bg); border: 1px solid #86efac; color: var(--green-txt); }
.banner-item.blau { background: #eff6ff; border: 1px solid #93c5fd; color: #1e40af; }
.banner-text { flex: 1; }
.banner-ablauf { font-size: 11px; opacity: 0.7; white-space: nowrap; }
.banner-close { background: none; border: none; cursor: pointer; opacity: 0.6; font-size: 14px; padding: 0 2px; }
.banner-close:hover { opacity: 1; }
.banner-add-btn { font-size: 12px; color: var(--text3); background: none; border: 1px dashed var(--border2); border-radius: var(--radius); padding: 4px 10px; cursor: pointer; margin-bottom: 8px; }
.banner-add-btn:hover { background: var(--bg2); color: var(--text2); }

/* SEARCH BAR */
.search-bar { display: flex; gap: 8px; margin-bottom: 12px; }
.search-bar input { flex: 1; padding: 7px 12px; border: 1px solid var(--border2); border-radius: var(--radius); font-size: 13px; font-family: 'DM Sans', sans-serif; background: var(--bg); min-width: 0; outline: none; }
.search-bar input:focus { border-color: var(--orange); }
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="amba-logo-text">
      <span class="amba-logo-amba">A M B A</span>
      <span class="amba-logo-ops">operations</span>
    </div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">Betrieb</div>
    <button class="nav-item active" id="nav-offline" onclick="setTab('offline')">
      <span class="nav-icon">⚡</span><span class="nav-label">Offline</span><span class="nav-count" id="cnt-offline">0</span>
    </button>
    <button class="nav-item" id="nav-stoerung" onclick="setTab('stoerung')">
      <span class="nav-icon">⚠</span><span class="nav-label">Störung</span><span class="nav-count" id="cnt-stoerung">0</span>
    </button>
    <div class="nav-section">Erledigt</div>
    <button class="nav-item" id="nav-erl-offline" onclick="setTab('erl-offline')">
      <span class="nav-icon">✓</span><span class="nav-label">Offline erledigt</span><span class="nav-count" id="cnt-erl-offline">0</span>
    </button>
    <button class="nav-item" id="nav-erl-stoerung" onclick="setTab('erl-stoerung')">
      <span class="nav-icon">✓</span><span class="nav-label">Störung erledigt</span><span class="nav-count" id="cnt-erl-stoerung">0</span>
    </button>
    <div class="nav-section">Irrelevant</div>
    <button class="nav-item" id="nav-irr-offline" onclick="setTab('irr-offline')">
      <span class="nav-icon">○</span><span class="nav-label">Offline irrelevant</span><span class="nav-count" id="cnt-irr-offline">0</span>
    </button>
    <button class="nav-item" id="nav-irr-stoerung" onclick="setTab('irr-stoerung')">
      <span class="nav-icon">○</span><span class="nav-label">Störung irrelevant</span><span class="nav-count" id="cnt-irr-stoerung">0</span>
    </button>
    <div class="nav-section">Auswertung</div>
    <button class="nav-item" id="nav-statistik" onclick="setTab('statistik')">
      <span class="nav-icon">📊</span><span class="nav-label">Statistik</span>
    </button>
  </nav>
</aside>
<div class="main-content">
  <div class="topbar">
    <span class="topbar-title" id="topbar-title">Offline</span>
    <div class="search-wrap" style="margin-left:16px">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="Im Tab suchen…" oninput="renderList()">
    </div>
    <div class="search-wrap" style="margin-left:8px">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-all" placeholder="Alle Tabs durchsuchen…" oninput="sucheAlleTabsDebounced()">
    </div>
    <div class="topbar-actions">
      <button class="btn btn-secondary btn-sm" onclick="loadStationen()">↻</button>
      <button class="btn btn-secondary btn-sm" onclick="openNeueStation()">+ Neu</button>
      <button class="btn btn-primary btn-sm" onclick="openImport()">↑ Importieren</button>
    </div>
  </div>
  <div class="banner-bar" id="banner-bar"></div>
  <div class="content-area">
    <div class="list-panel" id="list-panel">
      <div id="search-all-results" style="display:none"></div>
      <div id="list"></div>
    </div>
    <div class="aktionsleiste" id="aktionsleiste">
      <span class="aktionsleiste-info" id="aktionsleiste-info">0 ausgewählt</span>
      <button class="btn btn-sm" style="background:#fff;color:#222" onclick="alleAbwaehlen()">✕ Abwählen</button>
      <button class="btn btn-sm" style="background:#16a34a;color:#fff" onclick="ausgewaehltErledigt()">✓ Erledigt</button>
      <button class="btn btn-sm" style="background:#6b7280;color:#fff" onclick="ausgewaehltIrrelevant()">○ Irrelevant</button>
      <button class="btn btn-sm" style="background:#dc2626;color:#fff" onclick="ausgewaehltLoeschen()">🗑 Löschen</button>
    </div>
    <div class="detail-panel" id="detail-panel">
      <div class="detail-header" id="dp-header" style="display:none">
        <div class="detail-header-info">
          <div class="detail-title" id="dp-title">–</div>
          <div class="detail-sub" id="dp-sub">–</div>
        </div>
        <button class="detail-close" onclick="closeDetail()">✕</button>
      </div>
      <div style="display:flex;justify-content:flex-end;padding:10px 16px 0;flex-shrink:0">
        <button class="detail-close" onclick="closeDetail()">✕</button>
      </div>
      <div class="detail-body" id="dp-body"></div>
      <div class="detail-footer" id="dp-footer"></div>
    </div>
  </div>
</div>
</div>
<div class="modal-overlay" id="banner-modal">
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <h2>Banner hinzufügen</h2>
      <button class="toggle-btn" onclick="closeBannerModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="edit-form">
        <div class="detail-label">Text</div>
        <textarea id="banner-text" placeholder="z.B. Geplante Abschaltung Standort München am 10.07." style="height:80px"></textarea>
        <div class="detail-label">Farbe</div>
        <select id="banner-farbe">
          <option value="gelb">🟡 Gelb – Hinweis</option>
          <option value="rot">🔴 Rot – Wichtig</option>
          <option value="gruen">🟢 Grün – Info</option>
          <option value="blau">🔵 Blau – Geplant</option>
        </select>
        <div class="detail-label">Ablaufdatum (optional)</div>
        <input type="date" id="banner-ablauf">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeBannerModal()">Abbrechen</button>
      <button class="btn btn-primary" onclick="saveBanner()">Banner erstellen</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="neue-station-modal">
  <div class="modal" style="max-width:500px">
    <div class="modal-header">
      <h2>Station manuell anlegen</h2>

async function sb(path, opts = {}) {
  const r = await fetch(SB_URL + '/rest/v1/' + path, { ...opts, headers: { ...H, 'Prefer': opts.prefer||'return=representation', ...(opts.headers||{}) } })

async function ladeStatistik() {
  document.getElementById('list').innerHTML = '<p style="color:#999;padding:20px">Lade Statistik…</p>'
  document.getElementById('detail-panel').classList.remove('open')
  try {
    const alle = await sb('stationen?select=id,meldungstyp,irrelevant,erledigt,loesung,kundenname,standort,interne_id,erstellt_am,ladepunkte(id,evse_id)') || []
    const aktiv = alle.filter(s=>!s.irrelevant&&!s.erledigt)
    const aktiv_off = aktiv.filter(s=>s.meldungstyp==='offline')
    const aktiv_st = aktiv.filter(s=>s.meldungstyp==='stoerung')
    const erledigt = alle.filter(s=>s.erledigt)
    const irrelevant = alle.filter(s=>s.irrelevant&&!s.erledigt)

    // Zähle nach EVSE-IDs (Ladepunkte)
    const evseCount = s => (s.ladepunkte||[]).length || 1
    const aktiv_off_lp = aktiv_off.reduce((a,s)=>a+evseCount(s),0)
    const aktiv_st_lp = aktiv_st.reduce((a,s)=>a+evseCount(s),0)

    // Lösungen zählen (nach EVSE)
    const loesungCount = {}
    for (const s of erledigt) {
      const lp = evseCount(s)
      const l = s.loesung || ''
      const key = !l ? 'Keine Angabe' : (LOESUNGEN.find(k => l.startsWith(k)) || 'Sonstiges')
      loesungCount[key] = (loesungCount[key]||0) + lp
    }
    const loesungSorted = Object.entries(loesungCount).sort((a,b)=>b[1]-a[1])

    // Wiederholungsausfälle: gleiche interne_id mehrfach erledigt
    const wiederholungMap = {}
    for (const s of erledigt) {
      const key = s.interne_id
      if (!wiederholungMap[key]) wiederholungMap[key] = { name: s.kundenname||s.interne_id, standort: s.standort||'', count: 0 }
      wiederholungMap[key].count++
    }
    const wiederholungen = Object.values(wiederholungMap).filter(s=>s.count>1).sort((a,b)=>b.count-a.count).slice(0,8)

    // Standorte mit aktuell meisten Ausfällen (aktive Offline+Störung nach Standort)
    const standortMap = {}
    for (const s of aktiv) {
      const key = (s.standort||s.kundenname||'–')
      if (!standortMap[key]) standortMap[key] = { name: key, lp: 0 }
      standortMap[key].lp += evseCount(s)
    }
    const standortSorted = Object.values(standortMap).sort((a,b)=>b.lp-a.lp).slice(0,8)

    // Zeitverlauf nach Kalenderwochen
    const getKW = (dateStr) => {
      const d = new Date(dateStr)
      const jan4 = new Date(d.getFullYear(), 0, 4)
      const startOfWeek = new Date(jan4)
      startOfWeek.setDate(jan4.getDate() - ((jan4.getDay() + 6) % 7))
      const diff = d - startOfWeek
      const kw = Math.floor(diff / (7 * 24 * 60 * 60 * 1000)) + 1
      return `KW${kw} ${d.getFullYear()}`
    }

    const kwMap = {}
    for (const s of alle.filter(s=>s.erledigt||(!s.erledigt&&!s.irrelevant))) {
      const kw = getKW(s.erstellt_am)
      if (!kwMap[kw]) kwMap[kw] = { kw, offline: 0, stoerung: 0, sort: new Date(s.erstellt_am) }
      const lp = (s.ladepunkte||[]).length || 1
      if (s.meldungstyp === 'offline') kwMap[kw].offline += lp
      else kwMap[kw].stoerung += lp
    }

    const kwSorted = Object.values(kwMap).sort((a,b) => a.sort - b.sort).slice(-16)
    const maxKW = Math.max(...kwSorted.map(k => k.offline + k.stoerung), 1)
    const kwBarH = 120

    const zeitverlaufHtml = kwSorted.length ? `
      <div style="display:flex;align-items:flex-end;gap:6px;height:${kwBarH+30}px;padding-bottom:24px;overflow-x:auto">
        ${kwSorted.map(k => {
          const offH = Math.round(k.offline / maxKW * kwBarH)
          const stH = Math.round(k.stoerung / maxKW * kwBarH)
          return `<div style="display:flex;flex-direction:column;align-items:center;flex:1;min-width:40px">
            <div style="display:flex;align-items:flex-end;gap:2px;height:${kwBarH}px">
              <div style="display:flex;flex-direction:column;align-items:center">
                ${k.offline ? `<span style="font-size:8px;color:#6b7280;margin-bottom:2px">${k.offline}</span><div style="width:14px;height:${offH}px;background:#9ca3af;border-radius:3px 3px 0 0" title="Offline: ${k.offline} LP"></div>` : '<div style="width:14px"></div>'}
              </div>
              <div style="display:flex;flex-direction:column;align-items:center">
                ${k.stoerung ? `<span style="font-size:8px;color:#d97706;margin-bottom:2px">${k.stoerung}</span><div style="width:14px;height:${stH}px;background:#f59e0b;border-radius:3px 3px 0 0" title="Störung: ${k.stoerung} LP"></div>` : '<div style="width:14px"></div>'}
              </div>
            </div>
            <div style="font-size:9px;color:var(--text3);margin-top:4px;text-align:center;white-space:nowrap">${k.kw}</div>
          </div>`
        }).join('')}
      </div>
      <div style="display:flex;gap:12px;font-size:12px;color:var(--text2)">
        <span><span style="display:inline-block;width:12px;height:12px;background:#9ca3af;border-radius:2px;margin-right:4px;vertical-align:middle"></span>Offline</span>
        <span><span style="display:inline-block;width:12px;height:12px;background:#f59e0b;border-radius:2px;margin-right:4px;vertical-align:middle"></span>Störung</span>
      </div>` : '<div style="color:var(--text3);font-size:13px">Noch keine Daten</div>'

    const barHtml = (val, max, color) => `<div style="height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-top:4px"><div style="height:100%;width:${Math.round(val/max*100)}%;background:${color};border-radius:4px"></div></div>`
    const maxL = loesungSorted[0]?.[1] || 1
    const maxW = wiederholungen[0]?.count || 1
    const maxSt = standortSorted[0]?.lp || 1

    document.getElementById('list').innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px">
        <div style="background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center">
          <div style="font-size:32px;font-weight:700;color:#6b7280">${aktiv_off_lp}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:4px">⚡ Offline Ladepunkte</div>
        </div>
        <div style="background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center">
          <div style="font-size:32px;font-weight:700;color:#f59e0b">${aktiv_st_lp}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:4px">⚠ Störung Ladepunkte</div>
        </div>
        <div style="background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center">
          <div style="font-size:32px;font-weight:700;color:#16a34a">${erledigt.length}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:4px">✓ Erledigt gesamt</div>
        </div>
        <div style="background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center">
          <div style="font-size:32px;font-weight:700;color:#6b7280">${irrelevant.length}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:4px">○ Irrelevant</div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
        <div style="background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px">
          <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px">Lösungsverteilung (nach Ladepunkten)</div>
          ${(()=>{
            if (!loesungSorted.length) return '<div style="color:var(--text3);font-size:13px">Noch keine Daten</div>'
            const total = loesungSorted.reduce((s,[,n])=>s+n,0)
            const pieColorMap = {
              'Neustart stromlos': '#0ea5e9',
              'Neustart RMS': '#6366f1',
              'Router Neustart': '#8b5cf6',
              'Softwareupdate': '#dc2626',
              'Serviceeinsatz': '#ec4899',
              'Kein Eingriff': '#14b8a6',
              'Sonstiges': '#64748b',
              'Keine Angabe': '#a3a3a3'
            }
            const pieColors = ['#0ea5e9','#6366f1','#8b5cf6','#dc2626','#ec4899','#14b8a6','#64748b']
            let startAngle = -Math.PI/2
            const cx=90,cy=90,r=75
            const slices = loesungSorted.map(([l,n],i)=>{
              const angle = (n/total)*2*Math.PI
              const x1=cx+r*Math.cos(startAngle), y1=cy+r*Math.sin(startAngle)
              startAngle+=angle
              const x2=cx+r*Math.cos(startAngle), y2=cy+r*Math.sin(startAngle)
              const large=angle>Math.PI?1:0
              const color=pieColorMap[l]||pieColors[i%pieColors.length]
              const path=`M${cx},${cy} L${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${large},1 ${x2.toFixed(1)},${y2.toFixed(1)} Z`
              return {l,n,color,path,pct:Math.round(n/total*100)}
            })
            return `<div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">
              <svg width="180" height="180" viewBox="0 0 180 180">
                ${slices.map(s=>`<path d="${s.path}" fill="${s.color}" stroke="#fff" stroke-width="2"/>`).join('')}
              </svg>
              <div style="flex:1;min-width:120px">
                ${slices.map(s=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;font-size:12px">
                  <span style="width:10px;height:10px;border-radius:50%;background:${s.color};flex-shrink:0"></span>
                  <span style="flex:1">${s.l}</span>
                  <span style="font-weight:600">${s.n} LP</span>
                  <span style="color:var(--text3)">${s.pct}%</span>
                </div>`).join('')}
              </div>
            </div>`
          })()}
        </div>
        <div style="background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px">
          <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px">Standorte mit aktuell meisten Ausfällen</div>
          ${standortSorted.map(s=>`<div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;font-size:13px">
              <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:75%">${s.name}</span>
              <span style="font-weight:600;flex-shrink:0">${s.lp} LP</span>
            </div>
            ${barHtml(s.lp,maxSt,'#ef4444')}

        </div>
      </div>

      <div style="background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px">
        <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px">Stationen mit Wiederholungsausfällen</div>
        ${wiederholungen.length ? wiederholungen.map(s=>`<div style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;font-size:13px">
            <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:75%">${s.name}${s.standort?' · '+s.standort:''}</span>
            <span style="font-weight:600;flex-shrink:0">${s.count}× ausgefallen</span>
          </div>
          ${barHtml(s.count,maxW,'#6d28d9')}
        </div>`).join('') : '<div style="color:var(--text3);font-size:13px">Keine Wiederholungsausfälle</div>'}
      </div>

      <div style="background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-top:16px">
        <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:16px">Zeitverlauf – Neue Ausfälle pro Kalenderwoche</div>
        ${zeitverlaufHtml}

  } catch(e) {

const MENTION_OPTIONEN = [
  { kuerzel: 'IV', name: 'Ingo Vogt' },
  { kuerzel: 'DS', name: 'Dmitrij Smolenski' },
  { kuerzel: 'FB', name: 'Ferdinand Busalt' }
]
let mentionAktiv = false, mentionIndex = 0, mentionGefiltert = []

function mentionAktuellesWort(input) {
  const pos = input.selectionStart
  const vorCursor = input.value.slice(0, pos)
  const match = vorCursor.match(/@([a-zA-ZäöüÄÖÜ]*)$/)
  return match ? match[1] : null
}

function mentionCheck(input) {
  const teilwort = mentionAktuellesWort(input)
  const dd = document.getElementById('mention-dropdown')
  if (teilwort === null) { mentionAktiv = false; dd.style.display = 'none'; return }
  mentionGefiltert = MENTION_OPTIONEN.filter(o => o.kuerzel.toLowerCase().startsWith(teilwort.toLowerCase()) || o.name.toLowerCase().startsWith(teilwort.toLowerCase()))
  if (!mentionGefiltert.length) { mentionAktiv = false; dd.style.display = 'none'; return }
  mentionAktiv = true
  mentionIndex = 0
  mentionRender(input)
}

function mentionRender(input) {
  const dd = document.getElementById('mention-dropdown')
  dd.innerHTML = mentionGefiltert.map((o, i) => `
    <div onclick="mentionAuswahl(${i}, document.getElementById('dp-kommentar-input'))" style="padding:7px 12px;cursor:pointer;font-size:13px;${i===mentionIndex?'background:var(--orange-bg)':''}">
      <strong>@${o.kuerzel}</strong> <span style="color:var(--text3)">${o.name}</span>
    </div>`).join('')
  dd.style.display = 'block'
}

function mentionAuswahl(i, input) {
  const o = mentionGefiltert[i]
  if (!o) return
  const pos = input.selectionStart
  const vorCursor = input.value.slice(0, pos)
  const nachCursor = input.value.slice(pos)
  const neuVorCursor = vorCursor.replace(/@([a-zA-ZäöüÄÖÜ]*)$/, '@' + o.kuerzel + ' ')
  input.value = neuVorCursor + nachCursor
  const neuePos = neuVorCursor.length
  input.focus()
  input.setSelectionRange(neuePos, neuePos)
  mentionAktiv = false
  document.getElementById('mention-dropdown').style.display = 'none'
}

function mentionKeydown(event, stationId) {
  const input = event.target
  if (mentionAktiv) {
    if (event.key === 'ArrowDown') { event.preventDefault(); mentionIndex = (mentionIndex + 1) % mentionGefiltert.length; mentionRender(input); return }
    if (event.key === 'ArrowUp') { event.preventDefault(); mentionIndex = (mentionIndex - 1 + mentionGefiltert.length) % mentionGefiltert.length; mentionRender(input); return }
    if (event.key === 'Enter' || event.key === 'Tab') { event.preventDefault(); mentionAuswahl(mentionIndex, input); return }
    if (event.key === 'Escape') { mentionAktiv = false; document.getElementById('mention-dropdown').style.display = 'none'; return }
  }
  if (event.key === 'Enter') addKommentar(stationId)
}

async function addKommentar(stationId) {
  const input = document.getElementById('dp-kommentar-input')
  const text = input ? input.value.trim() : ''
  if (!text) return
  try {
    // @-Kürzel durch vollen Namen ersetzen
    const namenMap = { 'IV': 'Ingo Vogt', 'DS': 'Dmitrij Smolenski', 'FB': 'Ferdinand Busalt' }
    const textMitNamen = text

async function erstelleTicket(stationId, typ) {
  const s = stationen.find(x => x.id === stationId)
  if (!s) return

  const evseList = (s.ladepunkte||[]).map(lp=>lp.evse_id||'–').join(', ')
  const standortName = s.standort||s.kundenname
  const texte = {
    router: `<p>Guten Tag,</p><p>die Ladestation(en) und der Router am Standort ${standortName} sind aktuell offline.<br>Könnten Sie einmal einen Neustart des Routers veranlassen?</p><p>Den Neustart können Sie direkt mit der Reset-Taste am Gerät durchführen (Abb. ähnlich).<br>Wenn Sie diese ca. 4-5 Sekunden drücken blinken alle 5 LED's, die die Signalstärke anzeigen und der Reset wird durchgeführt.<br>Zu beachten ist nur, dass Sie die Taste nicht länger als 10 Sekunden drücken dürfen, dann würde ein Reset auf Werkseinstellungen durchgeführt und der Router müsste neu konfiguriert werden.</p><p><img src='https://raw.githubusercontent.com/AO-Ingo/Betrieb-Stoerungen/main/assets/router-reset.png' alt='Router Reset Taste' style='max-width:300px'></p><p>Betroffene EVSE-IDs: ${evseList}</p>`,
    station: `<p>Guten Tag,</p><p>die Ladepunkte am Standort "${standortName}" sind aktuell offline.<br>Der Router bzw. die SIM-Karte ist aber online, daher scheint es direkt an der Station "${s.interne_id}" zu liegen.<br>Könnten Sie vielleicht einmal einen Neustart veranlassen (durch aus- und wieder einsichern der Anlage)?</p><p>Falls der Ausfall planmäßig ist, würden wir uns auch über eine kurze Rückmeldung freuen.</p><p>Betroffene EVSE-IDs: ${evseList}</p>`,
    stoerung_neustart: `<p>Guten Tag,</p><p>die Ladepunkte (${evseList}) am Standort "${standortName}" melden aktuell eine Störung.</p><p>Könnten Sie die Station einmal auf Beschädigungen o.ä. untersuchen lassen und einen Neustart veranlassen (durch aus- und wieder einsichern der Anlage)?</p><p>Seriennummer der Station: ${s.interne_id}</p>`,
    stoerung_sicherung: `<p>Guten Tag,</p><p>die Ladepunkte (${evseList}) am Standort "${standortName}" melden aktuell eine Störung.</p><p>Es scheint eine Sicherung gefallen zu sein.<br>Gibt es eine Haustechnik vor Ort, die sich die Station einmal ansehen und die Sicherung ggf. wieder umlegen könnte?</p><p>Seriennummer der Station: ${s.interne_id}</p>`
  }

  const betreff = {
    router: `${s.kundenname} ${standortName} - Router offline`,
    station: `${s.kundenname} ${standortName} - Ladestation offline`,
    stoerung_neustart: `${s.kundenname} ${standortName} - Störung Ladestation`,
    stoerung_sicherung: `${s.kundenname} ${standortName} - Störung Ladestation`
  }

  const payload = {
    typ,
    station_id: s.id,
    dashboard: s.kundenname,
    standort: s.standort,
    interne_id: s.interne_id,
    evse_ids: evseList,
    betreff: betreff[typ],
    text: texte[typ]
  }

  const btnId = typ === 'router' ? 'ticket-btn-router' : typ === 'station' ? 'ticket-btn-station' : typ === 'stoerung_neustart' ? 'ticket-btn-neustart' : 'ticket-btn-sicherung'
  const btn = document.getElementById(btnId)
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Wird erstellt…' }

  try {
    const res = await fetch('https://hook.eu2.make.com/9tv9rjga4ygwkz1ycim935rro6xwovov', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
    if (res.ok) {
      alert('✓ Ticket wurde in Zoho Desk erstellt!')
    } else {
      alert('Fehler beim Erstellen: ' + res.status)
    }
  } catch(e) {
    alert('Fehler: ' + e.message)
  } finally {
    if (btn) {
      btn.disabled = false
      const labels = { router:'🔴 Ticket: Router offline', station:'⚡ Ticket: Station offline', stoerung_neustart:'⚡ Ticket: Neustart stromlos', stoerung_sicherung:'🔌 Ticket: Sicherung gefallen' }
      btn.textContent = labels[typ] || typ
    }
    // Warte 3 Sekunden damit Make Zeit hat Supabase zu updaten, dann neu laden
    setTimeout(async () => {
      await loadStationen()
      openDetail(stationId)
    }, 3000)
  }
}

async function loadBanner() {
  try {
    const heute = new Date().toISOString().split('T')[0]
    const banner = await sb(`banner?or=(ablauf.is.null,ablauf.gte.${heute})&order=erstellt_am.asc`) || []
    alleBanner = banner
    const bar = document.getElementById('banner-bar')
    if (!bar) return

    const icons = { gelb: '&#9888;', rot: '&#128308;', gruen: '&#9989;', blau: '&#128197;' }
    bar.innerHTML = banner.map(b => {
      const ablaufStr = b.ablauf ? ` · bis ${new Date(b.ablauf+'T00:00:00').toLocaleDateString('de-DE')}` : ''
      return `<div class="banner-item ${b.farbe}" id="banner-${b.id}">
        <span>${icons[b.farbe]||'⚠'}</span>
        <span class="banner-text">${b.text}</span>
        <span class="banner-ablauf">${ablaufStr}</span>
        <button class="banner-close" onclick="editBannerById('${b.id}')" title="Bearbeiten">✎</button>
        <button class="banner-close" onclick="loescheBanner('${b.id}')" title="Banner entfernen">✕</button>
      </div>`
    }).join('')

    bar.innerHTML += `<button class="banner-add-btn" onclick="openBannerModal()">+ Banner hinzufügen</button>`
  } catch(e) {}
}

const selectedCards = new Set()

function handleCardClick(event, id) {
  if (event.target.type === 'checkbox') return
  if (event.target.closest('.mitarbeiter-badge')) return
  if (selectedCards.size > 0) {
    toggleCard(id)
  } else {
    openDetail(id)
  }
}

function toggleCard(id) {
  const card = document.getElementById('card-' + id)
  const chk = document.getElementById('chk-' + id)
  if (selectedCards.has(id)) {
    selectedCards.delete(id)
    card.classList.remove('checked')
    if (chk) chk.checked = false
  } else {
    selectedCards.add(id)
    card.classList.add('checked')
    if (chk) chk.checked = true
  }
  updateAktionsleiste()
}

function updateAktionsleiste() {
  const bar = document.getElementById('aktionsleiste')
  const info = document.getElementById('aktionsleiste-info')
  if (selectedCards.size > 0) {
    bar.classList.add('visible')
    info.textContent = selectedCards.size + ' ausgewählt'
  } else {
    bar.classList.remove('visible')
  }
}

function alleAbwaehlen() {
  selectedCards.forEach(id => {
    const card = document.getElementById('card-' + id)
    const chk = document.getElementById('chk-' + id)
    if (card) card.classList.remove('checked')
    if (chk) chk.checked = false
  })
  selectedCards.clear()
  updateAktionsleiste()
}

  const ids = gruppenIdsMap[key1] || gruppenIdsMap[key2] || gruppenIdsMap['grp_' + gruppeId.replace(/[^a-zA-Z0-9]/g,'_')]
  if (!ids || !ids.length) {

async function speichereGruppe() {
  const overlay = document.querySelector('.app-overlay')
  const ids = window._gruppeIds || []
  const farbe = overlay?.querySelector('#grp-farbe')?.value ?? null
  const ma = overlay?.querySelector('#grp-ma')?.value ?? null
  const notizen = overlay?.querySelector('#grp-notizen')?.value || null
  if (overlay) overlay.remove()
  window._gruppeIds = null
  for (const id of ids) {
    const patch = {}
    if (farbe !== null) patch.prioritaet_farbe = farbe || null
    if (ma !== null) patch.mitarbeiter = ma || null
    if (notizen) patch.notizen = notizen
    if (Object.keys(patch).length) {
      await sb(`stationen?id=eq.${id}`, { method:'PATCH', prefer:'return=minimal', body: JSON.stringify(patch) })
    }
  }
  await loadStationen()
}

async function loadStationen() {
  document.getElementById('list').innerHTML = '<p style="color:#999;padding:20px">Lade…</p>'
  try {
    let q
    if (tab === 'offline')       q = 'stationen?meldungstyp=eq.offline&irrelevant=eq.false&erledigt=eq.false&select=*,ladepunkte(*),kommentare(*)&order=erstellt_am.desc'
    else if (tab === 'stoerung') q = 'stationen?meldungstyp=eq.stoerung&irrelevant=eq.false&erledigt=eq.false&select=*,ladepunkte(*),kommentare(*)&order=erstellt_am.desc'
    else if (tab === 'erl-offline')   q = 'stationen?meldungstyp=eq.offline&erledigt=eq.true&select=*,ladepunkte(*),kommentare(*)&order=erstellt_am.desc'
    else if (tab === 'erl-stoerung')  q = 'stationen?meldungstyp=eq.stoerung&erledigt=eq.true&select=*,ladepunkte(*),kommentare(*)&order=erstellt_am.desc'
    else if (tab === 'irr-offline')   q = 'stationen?meldungstyp=eq.offline&irrelevant=eq.true&erledigt=eq.false&select=*,ladepunkte(*),kommentare(*)&order=erstellt_am.desc'
    else                              q = 'stationen?meldungstyp=eq.stoerung&irrelevant=eq.true&erledigt=eq.false&select=*,ladepunkte(*)&order=erstellt_am.desc'
    stationen = await sb(q) || []
    await updateCounts()
    renderList()
  } catch(e) {
    document.getElementById('list').innerHTML = `<div class="error-box">Fehler: ${e.message}</div>`
  }
}

async function updateCounts() {
  try {
    const all = await sb('stationen?select=id,meldungstyp,irrelevant,erledigt') || []
    document.getElementById('cnt-offline').textContent      = all.filter(s=>s.meldungstyp==='offline'&&!s.irrelevant&&!s.erledigt).length
    document.getElementById('cnt-stoerung').textContent     = all.filter(s=>s.meldungstyp==='stoerung'&&!s.irrelevant&&!s.erledigt).length
    document.getElementById('cnt-erl-offline').textContent  = all.filter(s=>s.meldungstyp==='offline'&&s.erledigt).length
    document.getElementById('cnt-erl-stoerung').textContent = all.filter(s=>s.meldungstyp==='stoerung'&&s.erledigt).length
    document.getElementById('cnt-irr-offline').textContent  = all.filter(s=>s.meldungstyp==='offline'&&s.irrelevant&&!s.erledigt).length
    document.getElementById('cnt-irr-stoerung').textContent = all.filter(s=>s.meldungstyp==='stoerung'&&s.irrelevant&&!s.erledigt).length
  } catch(e) {}
}

const TAB_LABELS = { 'offline':'Offline','stoerung':'Störung','erl-offline':'Offline erledigt','erl-stoerung':'Störung erledigt','irr-offline':'Offline irrelevant','irr-stoerung':'Störung irrelevant','statistik':'Statistik' }
const LOESUNGEN = ['Neustart stromlos', 'Neustart RMS', 'Router Neustart', 'Softwareupdate', 'Serviceeinsatz', 'Kein Eingriff', 'Sonstiges']

function setTab(t) {
  tab = t
  closeDetail()
  Object.keys(TAB_LABELS).forEach(id => {
    const el = document.getElementById('nav-'+id)
    if (el) el.className = 'nav-item' + (id===t ? ' active' : '')
  })
  const titleEl = document.getElementById('topbar-title')
  if (titleEl) titleEl.textContent = TAB_LABELS[t] || t
  if (t === 'statistik') { ladeStatistik(); return }
  loadStationen()
}

function renderList() {
  const q = document.getElementById('search').value.toLowerCase()
  const farbOrder = { rot: 0, gelb: 1, gruen: 2, '': 3, null: 3, undefined: 3 }
  const f = stationen
    .filter(s => !q || [s.kundenname,s.interne_id,s.standort,s.bezeichnung].some(v=>(v||'').toLowerCase().includes(q)) || (s.ladepunkte||[]).some(lp=>(lp.evse_id||'').toLowerCase().includes(q)))
    .sort((a,b) => (farbOrder[a.prioritaet_farbe] ?? 3) - (farbOrder[b.prioritaet_farbe] ?? 3))
  if (!f.length) { document.getElementById('list').innerHTML = `<div class="empty"><div style="font-size:40px">○</div><div>Keine Einträge</div></div>`; return }

  // Gruppiere nach Dashboard + Standort (nur wenn beide gleich und > 1 Karte)
  const gruppenMap = new Map()
  const einzeln = []

  for (const s of f) {
    const key = (s.kundenname||'') + '|||' + (s.standort||'')
    if (!gruppenMap.has(key)) gruppenMap.set(key, [])
    gruppenMap.get(key).push(s)
  }

  let html = ''
  for (const [key, karten] of gruppenMap) {
    // Karten die mit gruppe_id getrennt wurden, separat anzeigen
    const getrennte = karten.filter(s => s.gruppe_id === 'solo')
    const gruppierte = karten.filter(s => s.gruppe_id !== 'solo')

    // Einzeln getrennte Karten
    for (const s of getrennte) {
      html += cardHTML(s)
    }

    if (gruppierte.length === 1) {
      html += cardHTML(gruppierte[0])
    } else if (gruppierte.length > 1) {
      const standort = gruppierte[0].standort || gruppierte[0].kundenname || '–'
      const dashboard = gruppierte[0].kundenname || '–'
      const gruppeId = 'grp-' + key.replace(/[^a-zA-Z0-9]/g, '-')
      const farben = gruppierte.map(s => s.prioritaet_farbe).filter(Boolean)
      const maxFarbe = farben.includes('rot') ? '🔴' : farben.includes('gelb') ? '🟡' : farben.includes('gruen') ? '🟢' : ''

      // Farbklasse der Gruppe = stärkste Farbe
      const grpKey = 'grp_' + gruppeId.replace(/-/g,'_')
      gruppenIdsMap[grpKey] = gruppierte.map(s=>s.id)
      const grpFarbe = farben.includes('rot') ? ' rot' : farben.includes('gelb') ? ' gelb' : farben.includes('gruen') ? ' gruen' : ''
      // Badge der Gruppe
      const grpBadgeClass = gruppierte.some(s=>s.meldungstyp==='offline') ? 'badge-offline' : 'badge-stoerung'
      const grpBadgeText = gruppierte.some(s=>s.meldungstyp==='offline') ? '⚡ Offline' : '⚠ Störung'
      // Router-Status
      const grpRouter = gruppierte.some(s=>s.router_online===true) ? '<span style="color:#16a34a;font-size:12px">🟢</span>' : gruppierte.some(s=>s.router_online===false) ? '<span style="color:#dc2626;font-size:12px">🔴</span>' : ''
      // Neuester Kommentar aus allen Karten der Gruppe
      const grpKommentare = gruppierte.flatMap(s=>s.kommentare||[]).sort((a,b)=>new Date(b.erstellt_am)-new Date(a.erstellt_am))
      const grpNeusterK = grpKommentare[0]
      const grpKVorschau = grpNeusterK ? `<span style="font-size:11px;color:var(--text2);background:var(--bg2);border-left:2px solid var(--orange);padding:1px 6px;border-radius:0 3px 3px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:250px">💬 ${grpNeusterK.text}</span>` : ''

      html += `<div class="gruppe">
        <div class="card${grpFarbe}" onclick="toggleGruppe('${gruppeId}')" style="cursor:pointer;margin-bottom:4px;padding-bottom:6px">
          <div style="display:flex;align-items:center;gap:6px;justify-content:space-between">
            <div style="display:flex;align-items:center;gap:6px;min-width:0;flex:1;overflow:hidden">
              <span class="badge ${grpBadgeClass}" style="flex-shrink:0">${grpBadgeText}</span>
              <span style="font-weight:500;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${dashboard}</span>
              <span class="badge" style="background:var(--bg3);color:var(--text2);font-size:10px">${gruppierte.length} Stationen</span>
            </div>
            <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
              ${grpRouter}
            </div>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:3px;gap:8px">
            <div style="display:flex;align-items:center;gap:8px;min-width:0;flex:1;overflow:hidden;flex-wrap:wrap">
              ${standort?`<span style="font-size:11px;color:var(--text3)">📍 ${standort}</span>`:''}
              ${grpKVorschau}
            </div>
            <button class="btn btn-sm btn-secondary" style="font-size:11px;padding:2px 8px;flex-shrink:0" data-grpkey="${grpKey}" onclick="event.stopPropagation();gruppeAufhebenByKey(this.dataset.grpkey)" title="Gruppe aufheben">↗ Trennen</button>
              <button class="btn btn-sm btn-secondary" style="font-size:11px;padding:2px 8px;flex-shrink:0" onclick="event.stopPropagation();bearbeiteGruppe('${gruppeId}')">✏</button>
              ${(()=>{
                const mas = [...new Set(gruppierte.map(s=>s.mitarbeiter).filter(Boolean))]
                const grpKey = 'grp_' + gruppeId.replace(/-/g,'_')
                gruppenIdsMap[grpKey] = gruppierte.map(s=>s.id)
                if (mas.length === 1) {
                  return `<span class="mitarbeiter-badge" onclick="event.stopPropagation();setGruppeMitarbeiterByKey('${grpKey}')" title="${mas[0]}">${mas[0]}</span>`
                } else if (mas.length > 1) {
                  return `<span class="mitarbeiter-badge" style="background:var(--text3)" onclick="event.stopPropagation();setGruppeMitarbeiterByKey('${grpKey}')" title="Verschiedene Mitarbeiter">?</span>`
                } else {
                  return `<span class="mitarbeiter-badge leer" onclick="event.stopPropagation();setGruppeMitarbeiterByKey('${grpKey}')" title="Mitarbeiter zuweisen">+</span>`
                }
              })()}
          </div>
          <div style="text-align:center;margin-top:6px;border-top:1px solid var(--border);padding-top:4px">
            <span class="gruppe-icon" id="icon-${gruppeId}" style="color:var(--text3);font-size:13px;transition:transform 0.15s;display:inline-block">∨</span>
          </div>
        </div>
        <div class="gruppe-cards" id="${gruppeId}">
          ${gruppierte.map(cardHTML).join('')}
        </div>
      </div>`
    }
  }

  document.getElementById('list').innerHTML = html
}

function toggleGruppe(id) {
  const cards = document.getElementById(id)
  const icon = document.getElementById('icon-' + id)
  if (cards) cards.classList.toggle('open')
  if (icon) {
    const isOpen = cards && cards.classList.contains('open')
    icon.textContent = isOpen ? '∧' : '∨'
  }
}

async function gruppeAufhebenByKey(key) {
  const ids = gruppenIdsMap[key] || []
  if (!ids.length) { alert('Gruppe nicht gefunden'); return }
  for (const id of ids) {
    await sb(`stationen?id=eq.${id}`, { method: 'PATCH', prefer: 'return=minimal', body: JSON.stringify({ gruppe_id: 'solo' }) })
  }
  await loadStationen()
}

async function gruppeAufheben(gruppeId, ids) {
  for (const id of ids) {
    await sb(`stationen?id=eq.${id}`, { method: 'PATCH', prefer: 'return=minimal', body: JSON.stringify({ gruppe_id: 'solo' }) })
  }
  await loadStationen()
}

function cardHTML(s) {
  const id = s.id
  const isIrr = s.irrelevant
  const isErl = s.erledigt
  const isAktiv = !isIrr && !isErl

  const farbklasse = s.prioritaet_farbe ? ' '+s.prioritaet_farbe : ''
  const badgeClass = isErl ? 'badge-erl' : isIrr ? 'badge-irr' : s.meldungstyp==='offline' ? 'badge-offline' : 'badge-stoerung'
  const badgeText = s.meldungstyp==='offline' ? '⚡ Offline' : '⚠ Störung'
  const tb = s.zoho_ticket_id
    ? s.zoho_ticket_url
      ? `<a href="${s.zoho_ticket_url}" target="_blank" onclick="event.stopPropagation()" class="badge badge-ticket" style="text-decoration:none">🎫 #${s.zoho_ticket_id}</a>`
      : `<span class="badge badge-ticket">🎫 #${s.zoho_ticket_id}</span>`
    : ''
  const tags = (s.ladepunkte||[]).map(lp=>`<span class="evse-tag">${lp.evse_id||'–'}</span>`).join('')
  const faelligStr = s.faelligkeit ? new Date(s.faelligkeit+'T00:00:00').toLocaleDateString('de-DE') : null

  // Router Symbol
  const routerSym = s.router_online===true
    ? '<span title="Router online" style="color:#16a34a;font-size:12px;line-height:1">🟢</span>'
    : s.router_online===false
    ? '<span title="Router offline" style="color:#dc2626;font-size:12px;line-height:1">🔴</span>'
    : ''

  // Neuester Kommentar
  const neusterK = (s.kommentare||[]).sort((a,b)=>new Date(b.erstellt_am)-new Date(a.erstellt_am))[0]
  const kVorschau = neusterK ? neusterK.text : ''

  // Fälligkeit
  let faelligHtml = ''
  if (faelligStr) {
    const heute = new Date(); heute.setHours(0,0,0,0)
    const faellig = new Date(s.faelligkeit+'T00:00:00')
    const diffTage = Math.ceil((faellig-heute)/(1000*60*60*24))
    const warn = diffTage<=3 ? '<svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\" style=\"display:inline;vertical-align:middle;margin-right:3px\"><path d=\"M12 2L2 20h20L12 2z\" stroke=\"#dc2626\" stroke-width=\"2\" stroke-linejoin=\"round\" fill=\"none\"/><line x1=\"12\" y1=\"9\" x2=\"12\" y2=\"14\" stroke=\"#dc2626\" stroke-width=\"2\" stroke-linecap=\"round\"/><circle cx=\"12\" cy=\"17\" r=\"1\" fill=\"#dc2626\"/></svg>' : ''
    const kleur = diffTage<=0?'#dc2626':diffTage<=3?'#d97706':'var(--text3)'
    faelligHtml = `<span style="font-size:11px;color:${kleur};font-weight:${diffTage<=3?'600':'400'}">${warn}📅 ${faelligStr}</span>`
  }

  const maBadge = s.mitarbeiter
    ? `<span class="mitarbeiter-badge" onclick="event.stopPropagation();setMitarbeiter('${id}')" title="${s.mitarbeiter}">${s.mitarbeiter.substring(0,2).toUpperCase()}</span>`
    : `<span class="mitarbeiter-badge leer" onclick="event.stopPropagation();setMitarbeiter('${id}')" title="Mitarbeiter zuweisen">+</span>`

  return `<div class="card${farbklasse}${selectedCards.has('${id}')?' checked':''}" onclick="handleCardClick(event,'${id}')" id="card-${id}">
    <input type="checkbox" class="card-checkbox" id="chk-${id}" onclick="event.stopPropagation();toggleCard('${id}')" ${selectedCards.has('${id}')?'checked':''}>
    <div style="display:flex;align-items:center;gap:6px;justify-content:space-between">
      <div style="display:flex;align-items:center;gap:6px;min-width:0;flex:1;overflow:hidden">
        <span class="badge ${badgeClass}" style="flex-shrink:0">${badgeText}</span>
        <span style="font-weight:500;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.kundenname||s.bezeichnung||'–'}</span>
        ${tb}
      </div>
      <div style="display:flex;align-items:center;gap:4px;flex-shrink:0">
        ${tags}${routerSym}
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:3px;gap:8px">
      <div style="display:flex;align-items:center;gap:8px;min-width:0;flex:1;overflow:hidden;flex-wrap:wrap">
        ${s.standort?`<span style="font-size:11px;color:var(--text3);flex-shrink:0">📍 ${s.standort}</span>`:''}
        ${kVorschau?`<span style="font-size:11px;color:var(--text2);background:var(--bg2);border-left:2px solid var(--orange);padding:1px 6px;border-radius:0 3px 3px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:250px">💬 ${kVorschau}</span>`:''}
        ${faelligHtml}
      </div>
      <span style="font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;white-space:nowrap;flex-shrink:0">${s.interne_id}</span>
      ${maBadge}
    </div>
  </div>`
}


let currentStation = null

function openDetail(id) {
  const s = stationen.find(x => x.id === id)
  if (!s) return
  currentStation = s

  // Karte markieren
  document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'))
  const cardEl = document.getElementById('card-'+id)
  if (cardEl) cardEl.classList.add('selected')

  const isIrr = s.irrelevant
  const isErl = s.erledigt
  const isAktiv = !isIrr && !isErl
  const faelligStr = s.faelligkeit ? new Date(s.faelligkeit+'T00:00:00').toLocaleDateString('de-DE') : null

  // Header
  document.getElementById('dp-title').textContent = s.kundenname || s.bezeichnung || '–'
  document.getElementById('dp-sub').textContent = s.interne_id

  // Body

function toggleEditSection() {
  const el = document.getElementById('dp-edit-section')
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none'
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open')
  document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'))
  currentStation = null
}

function togglePopup(id) {
  document.getElementById(id).classList.toggle('open')
}

async function markiereErledigt(id) {
  const sel = document.getElementById('dp-erl-select')
  const sonst = document.getElementById('dp-erl-sonstiges')
  const loesung = sel ? (sel.value === 'Sonstiges' && sonst ? sel.value + ': ' + sonst.value : sel.value) : (document.getElementById('erl-txt-'+id)||{}).value||''
  try {
    await sb(`stationen?id=eq.${id}`, { method:'PATCH', prefer:'return=minimal', body: JSON.stringify({ erledigt: true, loesung: loesung||null }) })
    loadStationen()
  } catch(e) { alert('Fehler: '+e.message) }
}

async function markiereIrrelevant(id) {
  const grund = (document.getElementById('dp-irr-grund') || document.getElementById('irr-grund-'+id)||{value:''}).value
  const notiz = (document.getElementById('dp-irr-notiz') || document.getElementById('irr-notiz-'+id)||{value:''}).value
  try {
    await sb(`stationen?id=eq.${id}`, { method:'PATCH', prefer:'return=minimal', body: JSON.stringify({ irrelevant: true, irrelevant_grund: notiz ? grund+': '+notiz : grund }) })
    await loadStationen()
    const fresh = stationen.find(x => x.id === id)
    if (fresh) openDetail(id)
  } catch(e) { alert('Fehler: '+e.message) }
}

async function reaktivieren(id) {
  try {
    await sb(`stationen?id=eq.${id}`, { method:'PATCH', prefer:'return=minimal', body: JSON.stringify({ irrelevant: false, irrelevant_grund: null }) })
    loadStationen()
  } catch(e) { alert('Fehler: '+e.message) }
}

async function reaktivierenAusErledigt(id) {
  if (!confirm('Station reaktivieren und zurück in die aktive Liste verschieben?')) return
  try {
    await sb(`stationen?id=eq.${id}`, { method:'PATCH', prefer:'return=minimal', body: JSON.stringify({ erledigt: false, loesung: null }) })
    closeDetail()
    loadStationen()
  } catch(e) { alert('Fehler: '+e.message) }
}

async function loeschen(id) {
  if (!confirm('Station wirklich löschen? Diese Aktion kann nicht rückgängig gemacht werden.')) return
  try {
    await sb(`ladepunkte?station_id=eq.${id}`, { method:'DELETE', prefer:'return=minimal' })
    await sb(`stationen?id=eq.${id}`, { method:'DELETE', prefer:'return=minimal' })
    await loadStationen()
    openDetail(id)
  } catch(e) { alert('Fehler: '+e.message) }
}

function addEvseRow(stationId) {
  const container = document.getElementById('ef-evse-list-' + stationId)
  const div = document.createElement('div')
  div.style.cssText = 'display:flex;gap:4px;margin-bottom:4px'
  div.innerHTML = `<input style="flex:1;padding:4px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px;font-family:monospace" placeholder="EVSE-ID" class="evse-input-${stationId} evse-new"><button class="btn btn-danger btn-sm" onclick="this.parentElement.remove()">✕</button>`
  container.appendChild(div)
}

async function loescheLP(lpId, stationId) {
  try {
    await sb(`ladepunkte?id=eq.${lpId}`, { method:'DELETE', prefer:'return=minimal' })
    loadStationen()
  } catch(e) { alert('Fehler: '+e.message) }
}

async function save(id) {
  try {
    // Station-Felder speichern
    const val = (elId) => { const el = document.getElementById(elId); return el ? el.value||null : null }
    await sb(`stationen?id=eq.${id}`, { method:'PATCH', prefer:'return=minimal', body: JSON.stringify({
      kundenname: val('ef-kunde-'+id),
      standort: val('ef-standort-'+id),
      zoho_ticket_id: val('ef-tid-'+id),
      zoho_ticket_url: val('ef-turl-'+id),
      faelligkeit: val('ef-date-'+id),
      prioritaet_farbe: val('ef-farbe-'+id),
      notizen: val('ef-notes-'+id),
      mitarbeiter: val('ef-ma-'+id)
    })})

    // Bestehende EVSE-IDs aktualisieren
    const evseInputs = document.querySelectorAll(`.evse-input-${id}:not(.evse-new)`)
    for (const inp of evseInputs) {
      const lpId = inp.dataset.lpid
      if (lpId) await sb(`ladepunkte?id=eq.${lpId}`, { method:'PATCH', prefer:'return=minimal', body: JSON.stringify({ evse_id: inp.value||null }) })
    }

    // Neue EVSE-IDs hinzufügen
    const newEvse = document.querySelectorAll(`.evse-input-${id}.evse-new`)
    for (const inp of newEvse) {
      if (inp.value.trim()) await sb('ladepunkte', { method:'POST', body: JSON.stringify({ station_id: id, evse_id: inp.value.trim(), prioritaet: null }) })
    }

    await loadStationen()
    openDetail(id)
  } catch(e) { alert('Fehler: '+e.message) }
}

function openImport() { document.getElementById('modal').classList.add('open'); showEingabe() }
function closeImport() { document.getElementById('modal').classList.remove('open') }

function showEingabe() {
  document.getElementById('mbody').innerHTML = `<p class="hint">Rohdaten einfügen – Parser erkennt Offline/Störung automatisch.</p><textarea class="raw" id="raw" placeholder="Rohdaten hier einfügen…"></textarea><div id="ierr"></div>`
  document.getElementById('mfoot').innerHTML = `<button class="btn btn-secondary" onclick="closeImport()">Abbrechen</button><button class="btn btn-primary" onclick="analyse()">Analysieren</button>`
}

function parse(raw) {
  const eintraege = []
  const lines = raw.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n')
  const PRIO = ['Mittel','Wichtig','Fehlerfrei','Niedrig','Hoch','Kritisch']
  let i = 0
  while (i < lines.length) {
    const line = lines[i].trim()
    if (!line) { i++; continue }
    if (line.includes('\t')) {
      const t = line.split('\t').map(x=>x.trim())
      const id = t[0]; if (!id) { i++; continue }
      const evse = t[2]&&t[2]!=='-'?t[2]:null
      const bez = t[3]&&t[3]!=='-'?t[3]:null
      const kunde = t[3]&&t[3]!=='-'?t[3]:null
      const standort = t[4]&&t[4]!=='-'?t[4]:null
      let mel='', prio=null, j=i+1
      while (j<lines.length&&j<i+6) {
        const nl=lines[j].trim()
        if (nl==='Offline'){mel='offline';j++;continue}
        if (nl==='Störung'||nl==='Stoerung'){mel='stoerung';j++;continue}
        if (PRIO.includes(nl)){prio=nl;j++;continue}
        if (nl===''){j++;continue}
        break
      }
      if (mel) eintraege.push({interne_id:id,bezeichnung:bez,kundenname:kunde,standort:standort,meldungstyp:mel,evse_id:evse,prioritaet:prio})
      i=j
    } else { i++ }
  }
  const map = new Map()
  for (const e of eintraege) {
    if (map.has(e.interne_id)) {
      const ex=map.get(e.interne_id)
      if (e.meldungstyp==='offline') ex.meldungstyp='offline'
      if (e.evse_id&&!ex.ladepunkte.find(lp=>lp.evse_id===e.evse_id)) ex.ladepunkte.push({evse_id:e.evse_id,prioritaet:e.prioritaet})
    } else {
      map.set(e.interne_id,{interne_id:e.interne_id,bezeichnung:e.bezeichnung,kundenname:e.kundenname,standort:e.standort||null,meldungstyp:e.meldungstyp,ladepunkte:[{evse_id:e.evse_id,prioritaet:e.prioritaet}]})
    }
  }
  return Array.from(map.values())
}

function analyse() {
  const raw = document.getElementById('raw').value
  if (!raw.trim()) { document.getElementById('ierr').innerHTML='<div class="error-box">Bitte Daten einfügen</div>'; return }
  parsed = parse(raw)
  if (!parsed.length) { document.getElementById('ierr').innerHTML='<div class="error-box">Keine Stationen erkannt</div>'; return }
  const off=parsed.filter(s=>s.meldungstyp==='offline').length
  const st=parsed.filter(s=>s.meldungstyp==='stoerung').length
  document.getElementById('mbody').innerHTML=`
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <span class="badge badge-offline" style="font-size:13px;padding:4px 10px">${parsed.length} Stationen</span>
      <span class="badge badge-offline" style="font-size:13px;padding:4px 10px">⚡ ${off} Offline</span>
      <span class="badge badge-stoerung" style="font-size:13px;padding:4px 10px">⚠ ${st} Störung</span>
    </div>
    <div style="max-height:340px;overflow-y:auto">
      ${parsed.map(s=>`<div class="preview-item">
        <div class="preview-item-header"><span class="preview-id">${s.interne_id}</span><span class="badge ${s.meldungstyp==='offline'?'badge-offline':'badge-stoerung'}">${s.meldungstyp==='offline'?'Offline':'Störung'}</span></div>
        <div style="font-weight:500">${s.kundenname||s.bezeichnung||'–'}</div>
        <div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:4px">${s.ladepunkte.map(lp=>`<span class="evse-tag">${lp.evse_id||'–'}</span>`).join('')}</div>
      </div>`).join('')}
    </div>`
  document.getElementById('mfoot').innerHTML=`<button class="btn btn-secondary" onclick="showEingabe()">← Zurück</button><button class="btn btn-primary" onclick="doImport()">${parsed.length} Stationen importieren</button>`
}

async function doImport() {
  document.getElementById('mfoot').innerHTML='<span style="color:#666;font-size:13px">⏳ Importiere…</span>'
  let neu=0,lp=0,dup=0,fehler=[]
  for (const s of parsed) {
    try {
      // Nur gegen aktive + irrelevante prüfen, NICHT gegen erledigte
      const bezFilter = s.bezeichnung ? `&bezeichnung=eq.${encodeURIComponent(s.bezeichnung)}` : '&bezeichnung=is.null'
      const ex = await sb(`stationen?interne_id=eq.${encodeURIComponent(s.interne_id)}${bezFilter}&erledigt=eq.false&select=id,meldungstyp`)
      if (ex&&ex.length) {
        const e=ex[0]
        if (e.meldungstyp==='stoerung'&&s.meldungstyp==='offline') await sb(`stationen?id=eq.${e.id}`,{method:'PATCH',prefer:'return=minimal',body:JSON.stringify({meldungstyp:'offline'})})
        for (const p of s.ladepunkte) {
          if (!p.evse_id) continue
          const elp=await sb(`ladepunkte?station_id=eq.${e.id}&evse_id=eq.${encodeURIComponent(p.evse_id)}&select=id`)
          if (!elp||!elp.length) { await sb('ladepunkte',{method:'POST',body:JSON.stringify({station_id:e.id,evse_id:p.evse_id,prioritaet:p.prioritaet})}); lp++ }
        }
        dup++
      } else {
        // Neu anlegen – auch wenn erledigt existiert
        const ns=await sb('stationen',{method:'POST',body:JSON.stringify({interne_id:s.interne_id,bezeichnung:s.bezeichnung,kundenname:s.kundenname,standort:s.standort||null,meldungstyp:s.meldungstyp})})
        if (ns&&ns[0]) { const sid=ns[0].id; for (const p of s.ladepunkte) await sb('ladepunkte',{method:'POST',body:JSON.stringify({station_id:sid,evse_id:p.evse_id,prioritaet:p.prioritaet})}) }
        neu++
      }
    } catch(e) {
      if (e.message && e.message.includes('23505')) { dup++ }
      else { fehler.push(s.interne_id+': '+e.message) }
    }
  }
  // Rückwärtsprüfung: aktive Stationen die nicht im Import sind
  let nichtMehrImport = []
  try {
    const aktive = await sb('stationen?erledigt=eq.false&irrelevant=eq.false&select=id,interne_id,bezeichnung,kundenname,meldungstyp') || []
    const importKeys = new Set(parsed.map(s => s.interne_id + '|||' + (s.bezeichnung||'__NULL__')))
    nichtMehrImport = aktive.filter(s => !importKeys.has(s.interne_id + '|||' + (s.bezeichnung||'__NULL__')))
  } catch(e) {}

  document.getElementById('mbody').innerHTML=`<div class="result-grid">
    <div class="result-box result-neu"><div class="num">${neu}</div><div class="label">Neue Stationen</div></div>
    <div class="result-box result-lp"><div class="num">${lp}</div><div class="label">Ladepunkte ergänzt</div></div>
    <div class="result-box result-dup"><div class="num">${dup}</div><div class="label">Bereits bekannt</div></div>
  </div>
  ${fehler.length?`<div class="error-box" style="margin-top:12px">${fehler.join('<br>')}</div>`:''}
  ${nichtMehrImport.length ? `
    <div style="margin-top:16px;border:1px solid #fbbf24;border-radius:8px;padding:12px;background:#fffbeb">
      <div style="font-weight:600;font-size:14px;margin-bottom:8px">⚠ ${nichtMehrImport.length} Station(en) nicht mehr im Export</div>
      <div style="font-size:12px;color:#666;margin-bottom:10px">Diese Stationen stehen noch als aktiv in der Liste, tauchen aber im aktuellen Export nicht mehr auf. Möglicherweise wieder online?</div>
      <div style="max-height:200px;overflow-y:auto;margin-bottom:10px">
        ${nichtMehrImport.map(s=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #fef3c7">
          <input type="checkbox" class="rueckwaerts-check" data-id="${s.id}" checked style="width:16px;height:16px">
          <span style="font-size:13px;flex:1">${s.kundenname||s.bezeichnung||s.interne_id}</span>
          <span style="font-size:11px;font-family:monospace;color:#999">${s.interne_id}</span>
          <span class="badge ${s.meldungstyp==='offline'?'badge-offline':'badge-stoerung'}" style="font-size:10px">${s.meldungstyp==='offline'?'Offline':'Störung'}</span>
        </div>`).join('')}
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px"><select id="rueck-loesung" style="padding:5px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px;font-family:'DM Sans',sans-serif"><option value="">– Lösung wählen –</option><option value="Neustart stromlos">Neustart stromlos</option><option value="Neustart RMS">Neustart RMS</option><option value="Router Neustart">Router Neustart</option><option value="Softwareupdate">Softwareupdate</option><option value="Serviceeinsatz">Serviceeinsatz</option><option value="Kein Eingriff">Kein Eingriff</option><option value="Sonstiges">Sonstiges</option></select><button class="btn btn-green btn-sm" onclick="markiereAusgewaehltErledigt()">✓ Erledigt markieren</button><button class="btn btn-secondary btn-sm" onclick="document.querySelectorAll('.rueckwaerts-check').forEach(cb=>cb.checked=false)">Alles abwählen</button><button class="btn btn-secondary btn-sm" onclick="document.querySelectorAll('.rueckwaerts-check').forEach(cb=>cb.checked=true)">Alles auswählen</button></div>
      </div>
    </div>` : '<div style="margin-top:12px;color:#16a34a;font-size:13px">✓ Alle aktiven Stationen sind noch im Export</div>'}
  `
  document.getElementById('mfoot').innerHTML=`<button class="btn btn-primary" onclick="closeImport();loadStationen()">Fertig</button>`
}

async function markiereAusgewaehltErledigt() {
  const checkboxen = document.querySelectorAll('.rueckwaerts-check:checked')
  const loesung = document.getElementById('rueck-loesung')?.value || ''
  if (!loesung) { alert('Bitte zuerst einen Lösungsgrund auswählen.'); return }
  for (const cb of checkboxen) {
    const id = cb.dataset.id
    try {
      await sb(`stationen?id=eq.${id}`, { method:'PATCH', prefer:'return=minimal', body: JSON.stringify({ erledigt: true, loesung }) })
    } catch(e) {}
  }
  closeImport()
  loadStationen()
}

async function handleDeepLink() {
  try {
    const params = new URLSearchParams(window.location.search)
    const zielId = params.get('station')
    if (!zielId) return false
    const treffer = await sb(`stationen?interne_id=eq.${encodeURIComponent(zielId)}&select=id,meldungstyp,irrelevant,erledigt`)
    if (!treffer || !treffer.length) return false
    const s = treffer[0]
    if (s.irrelevant && !s.erledigt) tab = s.meldungstyp === 'offline' ? 'irr-offline' : 'irr-stoerung'
    else if (s.erledigt) tab = s.meldungstyp === 'offline' ? 'erl-offline' : 'erl-stoerung'
    else tab = s.meldungstyp === 'offline' ? 'offline' : 'stoerung'
    Object.keys(TAB_LABELS).forEach(id => {
      const el = document.getElementById('nav-'+id)
      if (el) el.className = 'nav-item' + (id===tab ? ' active' : '')
    })
    const titleEl = document.getElementById('topbar-title')
    if (titleEl) titleEl.textContent = TAB_LABELS[tab] || tab
    await loadStationen()
    openDetail(s.id)
    history.replaceState(null, '', window.location.pathname)
    return true
  } catch(e) { return false }
}

loadBanner()
handleDeepLink().then(handled => { if (!handled) loadStationen() })
</script>
