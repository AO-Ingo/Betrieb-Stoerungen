<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ladestation Tracker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; }
header { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
header h1 { font-size: 18px; font-weight: 600; }
.btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; display: inline-flex; align-items: center; gap: 6px; }
.btn-primary { background: #2563eb; color: #fff; }
.btn-primary:hover { background: #1d4ed8; }
.btn-secondary { background: #fff; color: #555; border: 1px solid #ddd; }
.btn-secondary:hover { background: #f5f5f5; }
.btn-sm { font-size: 12px; padding: 5px 10px; }
.btn-danger { background: #fff; color: #dc2626; border: 1px solid #fca5a5; }
.btn-danger:hover { background: #fef2f2; }
.btn-success { background: #fff; color: #16a34a; border: 1px solid #86efac; }
.btn-success:hover { background: #f0fdf4; }
.btn-green { background: #16a34a; color: #fff; }
.btn-green:hover { background: #15803d; }
.btn-red { background: #dc2626; color: #fff; }
.btn-red:hover { background: #b91c1c; }
main { max-width: 1200px; margin: 0 auto; padding: 16px 24px; }
.tabs { display: flex; gap: 2px; background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 3px; margin-bottom: 16px; flex-wrap: nowrap; overflow-x: auto; }
.tab { padding: 5px 10px; border-radius: 6px; border: none; cursor: pointer; font-size: 11px; font-weight: 500; background: none; color: #555; white-space: nowrap; }
.tab.active-offline { background: #f97316; color: #fff; }
.tab.active-stoerung { background: #ef4444; color: #fff; }
.tab.active-erl-offline { background: #16a34a; color: #fff; }
.tab.active-erl-stoerung { background: #15803d; color: #fff; }
.tab.active-irr-offline { background: #9ca3af; color: #fff; }
.tab.active-irr-stoerung { background: #6b7280; color: #fff; }
.search-bar { display: flex; gap: 8px; margin-bottom: 16px; }
.search-bar input { flex: 1; padding: 8px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
.card { background: #fff; border: 2px solid #e0e0e0; border-radius: 8px; padding: 8px 12px; margin-bottom: 6px; }
.card.rot { border-color: #ef4444; background: #fff5f5; }
.card-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.card-main { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
.card-meta { font-size: 11px; color: #aaa; font-family: monospace; }
.card.gelb { border-color: #f59e0b; background: #fffbf0; }
.card.gruen { border-color: #22c55e; background: #f0fdf4; }
.badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
.badge-offline { background: #fff7ed; color: #c2410c; }
.badge-stoerung { background: #fef2f2; color: #b91c1c; }
.badge-ticket { background: #f5f3ff; color: #6d28d9; }
.badge-irr { background: #f3f4f6; color: #6b7280; }
.badge-erl { background: #f0fdf4; color: #166534; }
.card-name { font-weight: 600; margin-top: 6px; font-size: 15px; }
.card-location { font-size: 13px; color: #666; margin-top: 2px; }
.card-id { font-size: 11px; color: #aaa; font-family: monospace; margin-top: 4px; }
.evse-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
.evse-tag { background: #f3f4f6; color: #444; font-size: 11px; font-family: monospace; padding: 2px 8px; border-radius: 4px; }
.card-details { margin-top: 12px; border-top: 1px solid #f0f0f0; padding-top: 10px; display: none; }
.card-details.open { display: block; }
.detail-label { font-size: 11px; color: #999; margin-bottom: 2px; margin-top: 6px; }
.detail-value { font-size: 13px; }
.edit-form { margin-top: 8px; display: flex; flex-direction: column; gap: 8px; }
.edit-form input, .edit-form textarea, .edit-form select { width: 100%; padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
.edit-form textarea { resize: none; height: 60px; }
.edit-actions { display: flex; gap: 6px; flex-wrap: wrap; }
.toggle-btn { background: none; border: none; cursor: pointer; color: #999; font-size: 18px; padding: 0 4px; }
.empty { text-align: center; padding: 60px 0; color: #aaa; }
.info-box { border-radius: 6px; padding: 8px 10px; margin-top: 8px; font-size: 12px; }
.info-box-green { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
.info-box-gray { background: #f9fafb; color: #6b7280; border: 1px solid #e5e7eb; }
.popup-box { display: none; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 12px; margin-top: 10px; }
.popup-box.open { display: block; }
.popup-box input, .popup-box select, .popup-box textarea { width: 100%; padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; margin-bottom: 8px; }
.popup-box textarea { resize: none; height: 70px; }
.popup-actions { display: flex; gap: 6px; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
.modal-overlay.open { display: flex; }
.modal { background: #fff; border-radius: 12px; width: 100%; max-width: 680px; max-height: 90vh; display: flex; flex-direction: column; }
.modal-header { padding: 20px 24px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
.modal-header h2 { font-size: 17px; font-weight: 600; }
.modal-body { flex: 1; overflow-y: auto; padding: 20px 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid #eee; display: flex; justify-content: flex-end; gap: 8px; }
textarea.raw { width: 100%; height: 220px; font-family: monospace; font-size: 12px; border: 1px solid #ddd; border-radius: 8px; padding: 10px; resize: none; }
.preview-item { border: 1px solid #e0e0e0; border-radius: 8px; padding: 10px; margin-bottom: 8px; font-size: 13px; }
.preview-item-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
.preview-id { font-family: monospace; color: #999; font-size: 11px; }
.result-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.result-box { border-radius: 8px; padding: 14px; text-align: center; }
.result-box .num { font-size: 28px; font-weight: 700; }
.result-box .label { font-size: 12px; margin-top: 4px; }
.result-neu { background: #f0fdf4; color: #166534; }
.result-lp { background: #eff6ff; color: #1e40af; }
.result-dup { background: #f9fafb; color: #6b7280; }
.error-box { background: #fef2f2; color: #b91c1c; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-top: 8px; }
.hint { font-size: 13px; color: #666; margin-bottom: 12px; }
</style>
</head>
<body>
<header>
  <h1>⚡ Ladestation Tracker</h1>
  <button class="btn btn-primary" onclick="openImport()">↑ Daten importieren</button>
</header>
<main>
  <div class="tabs">
    <button class="tab active-offline" id="tab-offline" onclick="setTab('offline')">⚡ Offline <span id="cnt-offline"></span></button>
    <button class="tab" id="tab-stoerung" onclick="setTab('stoerung')">⚠ Störung <span id="cnt-stoerung"></span></button>
    <button class="tab" id="tab-erl-offline" onclick="setTab('erl-offline')">✓ Offline erledigt <span id="cnt-erl-offline"></span></button>
    <button class="tab" id="tab-erl-stoerung" onclick="setTab('erl-stoerung')">✓ Störung erledigt <span id="cnt-erl-stoerung"></span></button>
    <button class="tab" id="tab-irr-offline" onclick="setTab('irr-offline')">○ Offline irrelevant <span id="cnt-irr-offline"></span></button>
    <button class="tab" id="tab-irr-stoerung" onclick="setTab('irr-stoerung')">○ Störung irrelevant <span id="cnt-irr-stoerung"></span></button>
  </div>
  <div class="search-bar">
    <input type="text" id="search" placeholder="Suche nach Kunde, Station-ID, EVSE-ID…" oninput="renderList()">
    <button class="btn btn-secondary" onclick="loadStationen()">↻</button>
  </div>
  <div id="list"></div>
</main>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h2>Daten importieren</h2>
      <button class="toggle-btn" onclick="closeImport()">✕</button>
    </div>
    <div class="modal-body" id="mbody"></div>
    <div class="modal-footer" id="mfoot"></div>
  </div>
</div>

<script>
const SB_URL = 'https://wqnadjsuhaqqbmlagqgv.supabase.co'
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndxbmFkanN1aGFxcWJtbGFncWd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2OTc4MDMsImV4cCI6MjA5ODI3MzgwM30.5gB9Uwuwrw2mlp3b2NAI8Lab7Sj_dB83uC-A7sSs_UI'
const GRUENDE = ['Keine Betreuung','Veraltet','Warten auf Kunden','Noch nicht in Betrieb','Anderer Grund']

let tab = 'offline', stationen = [], parsed = []
const H = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' }

async function sb(path, opts = {}) {
  const r = await fetch(SB_URL + '/rest/v1/' + path, { ...opts, headers: { ...H, 'Prefer': opts.prefer||'return=representation', ...(opts.headers||{}) } })
  const t = await r.text()
  if (!r.ok) throw new Error(t)
  return t ? JSON.parse(t) : null
}

async function loadStationen() {
  document.getElementById('list').innerHTML = '<p style="color:#999;padding:20px">Lade…</p>'
  try {
    let q
    if (tab === 'offline')       q = 'stationen?meldungstyp=eq.offline&irrelevant=eq.false&erledigt=eq.false&select=*,ladepunkte(*)&order=erstellt_am.desc'
    else if (tab === 'stoerung') q = 'stationen?meldungstyp=eq.stoerung&irrelevant=eq.false&erledigt=eq.false&select=*,ladepunkte(*)&order=erstellt_am.desc'
    else if (tab === 'erl-offline')   q = 'stationen?meldungstyp=eq.offline&erledigt=eq.true&select=*,ladepunkte(*)&order=erstellt_am.desc'
    else if (tab === 'erl-stoerung')  q = 'stationen?meldungstyp=eq.stoerung&erledigt=eq.true&select=*,ladepunkte(*)&order=erstellt_am.desc'
    else if (tab === 'irr-offline')   q = 'stationen?meldungstyp=eq.offline&irrelevant=eq.true&erledigt=eq.false&select=*,ladepunkte(*)&order=erstellt_am.desc'
    else                              q = 'stationen?meldungstyp=eq.stoerung&irrelevant=eq.true&erledigt=eq.false&select=*,ladepunkte(*)&order=erstellt_am.desc'
    stationen = await sb(q) || []
    await updateCounts()
    renderList()
  } catch(e) {
    document.getElementById('list').innerHTML = `<div class="error-box">Fehler: ${e.message}</div>`
  }
}

async function updateCounts() {
  try {
    const all = await sb('stationen?select=id,meldungstyp,irrelevant,erledigt') || []
    document.getElementById('cnt-offline').textContent      = '('+all.filter(s=>s.meldungstyp==='offline'&&!s.irrelevant&&!s.erledigt).length+')'
    document.getElementById('cnt-stoerung').textContent     = '('+all.filter(s=>s.meldungstyp==='stoerung'&&!s.irrelevant&&!s.erledigt).length+')'
    document.getElementById('cnt-erl-offline').textContent  = '('+all.filter(s=>s.meldungstyp==='offline'&&s.erledigt).length+')'
    document.getElementById('cnt-erl-stoerung').textContent = '('+all.filter(s=>s.meldungstyp==='stoerung'&&s.erledigt).length+')'
    document.getElementById('cnt-irr-offline').textContent  = '('+all.filter(s=>s.meldungstyp==='offline'&&s.irrelevant&&!s.erledigt).length+')'
    document.getElementById('cnt-irr-stoerung').textContent = '('+all.filter(s=>s.meldungstyp==='stoerung'&&s.irrelevant&&!s.erledigt).length+')'
  } catch(e) {}
}

const TAB_CLASSES = { 'offline':'active-offline','stoerung':'active-stoerung','erl-offline':'active-erl-offline','erl-stoerung':'active-erl-stoerung','irr-offline':'active-irr-offline','irr-stoerung':'active-irr-stoerung' }

function setTab(t) {
  tab = t
  Object.keys(TAB_CLASSES).forEach(id => {
    document.getElementById('tab-'+id).className = 'tab' + (id===t ? ' '+TAB_CLASSES[t] : '')
  })
  loadStationen()
}

function renderList() {
  const q = document.getElementById('search').value.toLowerCase()
  const farbOrder = { rot: 0, gelb: 1, gruen: 2, '': 3, null: 3, undefined: 3 }
  const f = stationen
    .filter(s => !q || [s.kundenname,s.interne_id,s.standort,s.bezeichnung].some(v=>(v||'').toLowerCase().includes(q)) || (s.ladepunkte||[]).some(lp=>(lp.evse_id||'').toLowerCase().includes(q)))
    .sort((a,b) => (farbOrder[a.prioritaet_farbe] ?? 3) - (farbOrder[b.prioritaet_farbe] ?? 3))
  if (!f.length) { document.getElementById('list').innerHTML = `<div class="empty"><div style="font-size:40px">○</div><div>Keine Einträge</div></div>`; return }
  document.getElementById('list').innerHTML = f.map(cardHTML).join('')
}

function cardHTML(s) {
  const id = s.id
  const isIrr = s.irrelevant
  const isErl = s.erledigt
  const isAktiv = !isIrr && !isErl

  const farbklasse = s.prioritaet_farbe ? ' '+s.prioritaet_farbe : ''
  const badgeClass = isErl ? 'badge-erl' : isIrr ? 'badge-irr' : s.meldungstyp==='offline' ? 'badge-offline' : 'badge-stoerung'
  const badgeText = s.meldungstyp==='offline' ? '⚡ Offline' : '⚠ Störung'
  const tb = s.zoho_ticket_id ? `<span class="badge badge-ticket">#${s.zoho_ticket_id}</span>` : ''
  const tags = (s.ladepunkte||[]).map(lp=>`<span class="evse-tag">${lp.evse_id||'–'}</span>`).join('')
  const datum = new Date(s.erstellt_am).toLocaleDateString('de-DE')
  const faelligStr = s.faelligkeit ? new Date(s.faelligkeit+'T00:00:00').toLocaleDateString('de-DE') : null
  const tlink = s.zoho_ticket_url ? `<a href="${s.zoho_ticket_url}" target="_blank" style="color:#2563eb;font-size:13px">🔗 Zoho Ticket</a>` : ''

  const infoBox = isErl && s.loesung
    ? `<div class="info-box info-box-green">✓ ${s.loesung}</div>`
    : isIrr && s.irrelevant_grund
    ? `<div class="info-box info-box-gray">${s.irrelevant_grund}</div>`
    : ''

  let aktionen = ''
  if (isAktiv) {
    aktionen = `
      <button class="btn btn-success btn-sm" onclick="togglePopup('erl-${id}')">✓ Erledigt</button>
      <button class="btn btn-danger btn-sm" onclick="togglePopup('irr-${id}')">✕ Irrelevant</button>
      <button class="btn btn-secondary btn-sm" onclick="loeschen('${id}')">🗑</button>`
  } else if (isErl) {
    aktionen = `<button class="btn btn-secondary btn-sm" onclick="loeschen('${id}')">🗑</button>`
  } else if (isIrr) {
    aktionen = `
      <button class="btn btn-success btn-sm" onclick="reaktivieren('${id}')">↩ Reaktivieren</button>
      <button class="btn btn-secondary btn-sm" onclick="loeschen('${id}')">🗑</button>`
  }

  const erlPopup = isAktiv ? `
    <div class="popup-box" id="erl-${id}">
      <div style="font-weight:500;font-size:13px;margin-bottom:8px">Wie wurde die Störung behoben?</div>
      <textarea id="erl-txt-${id}" placeholder="Lösung beschreiben…"></textarea>
      <div class="popup-actions">
        <button class="btn btn-green btn-sm" onclick="markiereErledigt('${id}')">✓ Bestätigen</button>
        <button class="btn btn-secondary btn-sm" onclick="togglePopup('erl-${id}')">Abbrechen</button>
      </div>
    </div>` : ''

  const irrPopup = isAktiv ? `
    <div class="popup-box" id="irr-${id}">
      <div style="font-weight:500;font-size:13px;margin-bottom:8px">Grund für Irrelevanz</div>
      <select id="irr-grund-${id}">${GRUENDE.map(g=>`<option>${g}</option>`).join('')}</select>
      <input type="text" id="irr-notiz-${id}" placeholder="Zusätzliche Notiz (optional)">
      <div class="popup-actions">
        <button class="btn btn-red btn-sm" onclick="markiereIrrelevant('${id}')">Bestätigen</button>
        <button class="btn btn-secondary btn-sm" onclick="togglePopup('irr-${id}')">Abbrechen</button>
      </div>
    </div>` : ''

  return `<div class="card${farbklasse}">
    <div class="card-row">
      <div class="card-main">
        <span class="badge ${badgeClass}" style="flex-shrink:0">${badgeText}</span>
        <span style="font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.kundenname||s.bezeichnung||'–'}</span>
        ${tb}
      </div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center">
        ${tags}
      </div>
      <button class="toggle-btn" onclick="document.getElementById('d${id}').classList.toggle('open')" style="flex-shrink:0">▾</button>
    </div>
    <div style="display:flex;align-items:center;gap:12px;margin-top:3px;flex-wrap:wrap">
      ${s.standort||s.bezeichnung?`<span style="font-size:12px;color:#888">📍 ${s.standort||s.bezeichnung}</span>`:''}
      <span class="card-meta">${s.interne_id}</span>
      ${faelligStr?`<span style="font-size:12px;color:#666">📅 ${faelligStr}</span>`:''}
      ${infoBox}
    </div>
    <div class="card-details" id="d${id}">
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">
        <div><div class="detail-label">Erstellt</div><div class="detail-value">${datum}</div></div>
        <div><div class="detail-label">Ladepunkte</div><div class="detail-value">${(s.ladepunkte||[]).length}</div></div>
        ${s.notizen?`<div><div class="detail-label">Notizen</div><div class="detail-value">${s.notizen}</div></div>`:''}
        ${tlink?`<div style="margin-top:4px">${tlink}</div>`:''}
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
        ${isAktiv?`<button class="btn btn-secondary btn-sm" onclick="document.getElementById('ef${id}').style.display='flex'">✏ Bearbeiten</button>`:''}
        ${aktionen}
      </div>
      ${erlPopup}
      ${irrPopup}
      ${isAktiv?`<div class="edit-form" id="ef${id}" style="display:none">
        <input id="et${id}" placeholder="Zoho Ticket-ID" value="${s.zoho_ticket_id||''}">
        <input id="eu${id}" placeholder="Zoho Ticket-URL" value="${s.zoho_ticket_url||''}">
        <input type="date" id="ef-date-${id}" value="${s.faelligkeit||''}">
        <select id="ef-farbe-${id}">
          <option value="">Kein Farbcode</option>
          <option value="gruen" ${s.prioritaet_farbe==='gruen'?'selected':''}>🟢 Grün – kein Handlungsbedarf</option>
          <option value="gelb" ${s.prioritaet_farbe==='gelb'?'selected':''}>🟡 Warten auf Kunden</option>
          <option value="rot" ${s.prioritaet_farbe==='rot'?'selected':''}>🔴 Rot – sofortiger Handlungsbedarf</option>
        </select>
        <textarea id="en${id}" placeholder="Notizen">${s.notizen||''}</textarea>
        <div class="edit-actions">
          <button class="btn btn-primary btn-sm" onclick="save('${id}')">💾 Speichern</button>
          <button class="btn btn-secondary btn-sm" onclick="document.getElementById('ef${id}').style.display='none'">Abbrechen</button>
        </div>
      </div>`:''}
    </div>
  </div>`
}
// OLD_CARDFN_END

function togglePopup(id) {
  document.getElementById(id).classList.toggle('open')
}

async function markiereErledigt(id) {
  const loesung = document.getElementById('erl-txt-'+id).value.trim()
  try {
    await sb(`stationen?id=eq.${id}`, { method:'PATCH', prefer:'return=minimal', body: JSON.stringify({ erledigt: true, loesung: loesung||null }) })
    loadStationen()
  } catch(e) { alert('Fehler: '+e.message) }
}

async function markiereIrrelevant(id) {
  const grund = document.getElementById('irr-grund-'+id).value
  const notiz = document.getElementById('irr-notiz-'+id).value
  try {
    await sb(`stationen?id=eq.${id}`, { method:'PATCH', prefer:'return=minimal', body: JSON.stringify({ irrelevant: true, irrelevant_grund: notiz ? grund+': '+notiz : grund }) })
    loadStationen()
  } catch(e) { alert('Fehler: '+e.message) }
}

async function reaktivieren(id) {
  try {
    await sb(`stationen?id=eq.${id}`, { method:'PATCH', prefer:'return=minimal', body: JSON.stringify({ irrelevant: false, irrelevant_grund: null }) })
    loadStationen()
  } catch(e) { alert('Fehler: '+e.message) }
}

async function loeschen(id) {
  if (!confirm('Station wirklich löschen? Diese Aktion kann nicht rückgängig gemacht werden.')) return
  try {
    await sb(`ladepunkte?station_id=eq.${id}`, { method:'DELETE', prefer:'return=minimal' })
    await sb(`stationen?id=eq.${id}`, { method:'DELETE', prefer:'return=minimal' })
    loadStationen()
  } catch(e) { alert('Fehler: '+e.message) }
}

async function save(id) {
  try {
    await sb(`stationen?id=eq.${id}`, { method:'PATCH', prefer:'return=minimal', body: JSON.stringify({ zoho_ticket_id: document.getElementById('et'+id).value||null, zoho_ticket_url: document.getElementById('eu'+id).value||null, notizen: document.getElementById('en'+id).value||null, faelligkeit: document.getElementById('ef-date-'+id).value||null, prioritaet_farbe: document.getElementById('ef-farbe-'+id).value||null }) })
    loadStationen()
  } catch(e) { alert('Fehler: '+e.message) }
}

function openImport() { document.getElementById('modal').classList.add('open'); showEingabe() }
function closeImport() { document.getElementById('modal').classList.remove('open') }

function showEingabe() {
  document.getElementById('mbody').innerHTML = `<p class="hint">Rohdaten einfügen – Parser erkennt Offline/Störung automatisch.</p><textarea class="raw" id="raw" placeholder="Rohdaten hier einfügen…"></textarea><div id="ierr"></div>`
  document.getElementById('mfoot').innerHTML = `<button class="btn btn-secondary" onclick="closeImport()">Abbrechen</button><button class="btn btn-primary" onclick="analyse()">Analysieren</button>`
}

function parse(raw) {
  const eintraege = []
  const lines = raw.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n')
  const PRIO = ['Mittel','Wichtig','Fehlerfrei','Niedrig','Hoch','Kritisch']
  let i = 0
  while (i < lines.length) {
    const line = lines[i].trim()
    if (!line) { i++; continue }
    if (line.includes('\t')) {
      const t = line.split('\t').map(x=>x.trim())
      const id = t[0]; if (!id) { i++; continue }
      const evse = t[2]&&t[2]!=='-'?t[2]:null
      const bez = t[3]&&t[3]!=='-'?t[3]:null
      const kunde = t[4]&&t[4]!=='-'?t[4]:null
      let mel='', prio=null, j=i+1
      while (j<lines.length&&j<i+6) {
        const nl=lines[j].trim()
        if (nl==='Offline'){mel='offline';j++;continue}
        if (nl==='Störung'||nl==='Stoerung'){mel='stoerung';j++;continue}
        if (PRIO.includes(nl)){prio=nl;j++;continue}
        if (nl===''){j++;continue}
        break
      }
      if (mel) eintraege.push({interne_id:id,bezeichnung:bez,kundenname:kunde,meldungstyp:mel,evse_id:evse,prioritaet:prio})
      i=j
    } else { i++ }
  }
  const map = new Map()
  for (const e of eintraege) {
    if (map.has(e.interne_id)) {
      const ex=map.get(e.interne_id)
      if (e.meldungstyp==='offline') ex.meldungstyp='offline'
      if (e.evse_id&&!ex.ladepunkte.find(lp=>lp.evse_id===e.evse_id)) ex.ladepunkte.push({evse_id:e.evse_id,prioritaet:e.prioritaet})
    } else {
      map.set(e.interne_id,{interne_id:e.interne_id,bezeichnung:e.bezeichnung,kundenname:e.kundenname,standort:null,meldungstyp:e.meldungstyp,ladepunkte:[{evse_id:e.evse_id,prioritaet:e.prioritaet}]})
    }
  }
  return Array.from(map.values())
}

function analyse() {
  const raw = document.getElementById('raw').value
  if (!raw.trim()) { document.getElementById('ierr').innerHTML='<div class="error-box">Bitte Daten einfügen</div>'; return }
  parsed = parse(raw)
  if (!parsed.length) { document.getElementById('ierr').innerHTML='<div class="error-box">Keine Stationen erkannt</div>'; return }
  const off=parsed.filter(s=>s.meldungstyp==='offline').length
  const st=parsed.filter(s=>s.meldungstyp==='stoerung').length
  document.getElementById('mbody').innerHTML=`
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <span class="badge badge-offline" style="font-size:13px;padding:4px 10px">${parsed.length} Stationen</span>
      <span class="badge badge-offline" style="font-size:13px;padding:4px 10px">⚡ ${off} Offline</span>
      <span class="badge badge-stoerung" style="font-size:13px;padding:4px 10px">⚠ ${st} Störung</span>
    </div>
    <div style="max-height:340px;overflow-y:auto">
      ${parsed.map(s=>`<div class="preview-item">
        <div class="preview-item-header"><span class="preview-id">${s.interne_id}</span><span class="badge ${s.meldungstyp==='offline'?'badge-offline':'badge-stoerung'}">${s.meldungstyp==='offline'?'Offline':'Störung'}</span></div>
        <div style="font-weight:500">${s.kundenname||s.bezeichnung||'–'}</div>
        <div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:4px">${s.ladepunkte.map(lp=>`<span class="evse-tag">${lp.evse_id||'–'}</span>`).join('')}</div>
      </div>`).join('')}
    </div>`
  document.getElementById('mfoot').innerHTML=`<button class="btn btn-secondary" onclick="showEingabe()">← Zurück</button><button class="btn btn-primary" onclick="doImport()">${parsed.length} Stationen importieren</button>`
}

async function doImport() {
  document.getElementById('mfoot').innerHTML='<span style="color:#666;font-size:13px">⏳ Importiere…</span>'
  let neu=0,lp=0,dup=0,fehler=[]
  for (const s of parsed) {
    try {
      // Nur gegen aktive + irrelevante prüfen, NICHT gegen erledigte
      const bezFilter = s.bezeichnung ? `&bezeichnung=eq.${encodeURIComponent(s.bezeichnung)}` : '&bezeichnung=is.null'
      const ex = await sb(`stationen?interne_id=eq.${encodeURIComponent(s.interne_id)}${bezFilter}&erledigt=eq.false&select=id,meldungstyp`)
      if (ex&&ex.length) {
        const e=ex[0]
        if (e.meldungstyp==='stoerung'&&s.meldungstyp==='offline') await sb(`stationen?id=eq.${e.id}`,{method:'PATCH',prefer:'return=minimal',body:JSON.stringify({meldungstyp:'offline'})})
        for (const p of s.ladepunkte) {
          if (!p.evse_id) continue
          const elp=await sb(`ladepunkte?station_id=eq.${e.id}&evse_id=eq.${encodeURIComponent(p.evse_id)}&select=id`)
          if (!elp||!elp.length) { await sb('ladepunkte',{method:'POST',body:JSON.stringify({station_id:e.id,evse_id:p.evse_id,prioritaet:p.prioritaet})}); lp++ }
        }
        dup++
      } else {
        // Neu anlegen – auch wenn erledigt existiert
        const ns=await sb('stationen',{method:'POST',body:JSON.stringify({interne_id:s.interne_id,bezeichnung:s.bezeichnung,kundenname:s.kundenname,standort:s.standort,meldungstyp:s.meldungstyp})})
        if (ns&&ns[0]) { const sid=ns[0].id; for (const p of s.ladepunkte) await sb('ladepunkte',{method:'POST',body:JSON.stringify({station_id:sid,evse_id:p.evse_id,prioritaet:p.prioritaet})}) }
        neu++
      }
    } catch(e) { fehler.push(s.interne_id+': '+e.message) }
  }
  // Rückwärtsprüfung: aktive Stationen die nicht im Import sind
  let nichtMehrImport = []
  try {
    const aktive = await sb('stationen?erledigt=eq.false&irrelevant=eq.false&select=id,interne_id,bezeichnung,kundenname,meldungstyp') || []
    const importKeys = new Set(parsed.map(s => s.interne_id + '|||' + (s.bezeichnung||'__NULL__')))
    nichtMehrImport = aktive.filter(s => !importKeys.has(s.interne_id + '|||' + (s.bezeichnung||'__NULL__')))
  } catch(e) {}

  document.getElementById('mbody').innerHTML=`<div class="result-grid">
    <div class="result-box result-neu"><div class="num">${neu}</div><div class="label">Neue Stationen</div></div>
    <div class="result-box result-lp"><div class="num">${lp}</div><div class="label">Ladepunkte ergänzt</div></div>
    <div class="result-box result-dup"><div class="num">${dup}</div><div class="label">Bereits bekannt</div></div>
  </div>
  ${fehler.length?`<div class="error-box" style="margin-top:12px">${fehler.join('<br>')}</div>`:''}
  ${nichtMehrImport.length ? `
    <div style="margin-top:16px;border:1px solid #fbbf24;border-radius:8px;padding:12px;background:#fffbeb">
      <div style="font-weight:600;font-size:14px;margin-bottom:8px">⚠ ${nichtMehrImport.length} Station(en) nicht mehr im Export</div>
      <div style="font-size:12px;color:#666;margin-bottom:10px">Diese Stationen stehen noch als aktiv in der Liste, tauchen aber im aktuellen Export nicht mehr auf. Möglicherweise wieder online?</div>
      <div style="max-height:200px;overflow-y:auto;margin-bottom:10px">
        ${nichtMehrImport.map(s=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #fef3c7">
          <input type="checkbox" class="rueckwaerts-check" data-id="${s.id}" checked style="width:16px;height:16px">
          <span style="font-size:13px;flex:1">${s.kundenname||s.bezeichnung||s.interne_id}</span>
          <span style="font-size:11px;font-family:monospace;color:#999">${s.interne_id}</span>
          <span class="badge ${s.meldungstyp==='offline'?'badge-offline':'badge-stoerung'}" style="font-size:10px">${s.meldungstyp==='offline'?'Offline':'Störung'}</span>
        </div>`).join('')}
      </div>
      <button class="btn btn-green btn-sm" onclick="markiereAusgewaehltErledigt()">✓ Ausgewählte als erledigt markieren</button>
    </div>` : '<div style="margin-top:12px;color:#16a34a;font-size:13px">✓ Alle aktiven Stationen sind noch im Export</div>'}
  `
  document.getElementById('mfoot').innerHTML=`<button class="btn btn-primary" onclick="closeImport();loadStationen()">Fertig</button>`
}

async function markiereAusgewaehltErledigt() {
  const checkboxen = document.querySelectorAll('.rueckwaerts-check:checked')
  for (const cb of checkboxen) {
    const id = cb.dataset.id
    try {
      await sb(`stationen?id=eq.${id}`, { method:'PATCH', prefer:'return=minimal', body: JSON.stringify({ erledigt: true, loesung: 'Nicht mehr im Export – vermutlich wieder online' }) })
    } catch(e) {}
  }
  closeImport()
  loadStationen()
}

loadStationen()
</script>
